<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Setup</title>
<style>
body{font-family:Arial,sans-serif;background:#060c18;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
.box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:40px;max-width:400px;width:100%;text-align:center}
h2{margin-bottom:8px;font-size:20px}
p{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:24px}
input{width:100%;padding:12px;border:1px solid rgba(255,255,255,.15);border-radius:10px;background:rgba(255,255,255,.06);color:#fff;font-size:14px;margin-bottom:12px;outline:none;box-sizing:border-box}
button{width:100%;padding:13px;background:#1648d8;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer}
.msg{margin-top:16px;padding:12px;border-radius:10px;font-size:13px;font-weight:600;display:none}
.ok{background:rgba(21,164,111,.2);color:#4dbb8a;display:block}
.err{background:rgba(255,30,30,.15);color:#ff6b6b;display:block}
</style>
</head>
<body>
<div class="box">
  <h2>Cadastrar Igor Vivas</h2>
  <p>Digite a senha que quer usar para o usuário <strong>igor</strong></p>
  <input type="password" id="senha" placeholder="Digite sua senha" onkeydown="if(event.key==='Enter')cadastrar()">
  <input type="password" id="senha2" placeholder="Confirme a senha" onkeydown="if(event.key==='Enter')cadastrar()">
  <button onclick="cadastrar()">Cadastrar agora</button>
  <div class="msg" id="msg"></div>
</div>
<script>
const URL = 'https://script.google.com/macros/s/AKfycbzhEqHsbzemeVhCfGIhdgZgrqRZcsSK7V8eIHUnk2xdLCAQbL0WLLK0bq9eGqnuo8DtDw/exec';

async function sha256(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function cadastrar(){
  const s1 = document.getElementById('senha').value;
  const s2 = document.getElementById('senha2').value;
  const msg = document.getElementById('msg');
  msg.className='msg';msg.style.display='none';

  if(!s1){msg.textContent='Digite uma senha.';msg.className='msg err';return;}
  if(s1!==s2){msg.textContent='As senhas não coincidem.';msg.className='msg err';return;}

  const hash = await sha256(s1);

  // Salvar no localStorage do admin também
  const usuarios = JSON.parse(localStorage.getItem('riva_admin_users')||'[]');
  const idx = usuarios.findIndex(u=>u.pessoaId==='9999999999999');
  const entry = {pessoaId:'9999999999999',usuario:'igor',senhaHash:hash};
  if(idx>=0) usuarios[idx]=entry; else usuarios.push(entry);
  localStorage.setItem('riva_admin_users', JSON.stringify(usuarios));

  // Enviar para o Sheets
  msg.textContent='Enviando...';msg.className='msg ok';

  fetch(URL, {
    method:'POST',
    body: JSON.stringify({action:'saveUsuario',usuario:{pessoaId:'9999999999999',usuario:'igor',senhaHash:hash,ativo:true}}),
    headers:{'Content-Type':'text/plain'},
    mode:'no-cors'
  }).then(function(){
    msg.textContent='✅ Cadastrado! Aguarde 3 segundos e tente logar com usuário "igor".';
    msg.className='msg ok';
    setTimeout(function(){ window.location.href='home.html'; }, 3000);
  }).catch(function(){
    msg.textContent='Erro de conexão. Tente novamente.';
    msg.className='msg err';
  });
}
</script>
</body>
</html>
