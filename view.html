*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
img{max-width:100%;display:block}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit}
a{color:inherit;text-decoration:none}
:root {
  --font-geist-sans: 'Inter', sans-serif;
  --royal: #1648d8;
  --royal-dark: #0d33a8;
  --royal-deep: #071f6d;
  --ferrari: #ff1e1e;
  --white: #ffffff;
  --ink: #0c1e48;
  --muted: #687695;
  --line: #dfe6f2;
  --canvas: #f6f8fc;
  --success: #15a46f;
  --sidebar-width: 258px;
  --topbar-height: 78px;
}
:root {
  --royal: #1648d8;
  --royal-dark: #0d33a8;
  --royal-deep: #071f6d;
  --ferrari: #ff1e1e;
  --white: #ffffff;
  --ink: #0c1e48;
  --muted: #687695;
  --line: #dfe6f2;
  --canvas: #f6f8fc;
  --success: #15a46f;
  --sidebar-width: 258px;
  --topbar-height: 78px;
}

* { box-sizing: border-box; }
html { background: var(--canvas); }
body {
  margin: 0;
  background: var(--canvas);
  color: var(--ink);
  font-family: var(--font-geist-sans), Inter, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
button, select, input { font: inherit; }
button { color: inherit; }

.app { min-height: 100vh; }

.sidebar {
  position: fixed;
  inset: 0 auto 0 0;
  z-index: 40;
  width: var(--sidebar-width);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background:
    radial-gradient(circle at 15% 80%, rgba(255,255,255,.11), transparent 28%),
    linear-gradient(165deg, #174ee4 0%, #123cc2 52%, #082a94 100%);
  box-shadow: 12px 0 35px rgba(12, 42, 130, .13);
  transition: width .34s cubic-bezier(.22,.75,.18,1), transform .34s cubic-bezier(.22,.75,.18,1);
}
.sidebar::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image: radial-gradient(rgba(255,255,255,.14) .75px, transparent .75px);
  background-size: 18px 18px;
  mask-image: linear-gradient(to bottom, transparent 15%, rgba(0,0,0,.4) 70%, #000);
}
.sidebarCollapsed .sidebar { width: 82px; }

.brandArea {
  position: relative;
  z-index: 1;
  height: 178px;
  padding: 21px 22px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid rgba(255,255,255,.15);
  transition: padding .32s ease, height .32s ease;
}
.fullBrand {
  width: 190px;
  height: 132px;
  overflow: hidden;
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 16px 34px rgba(2, 20, 83, .22), inset 0 0 0 1px rgba(255,255,255,.8);
  opacity: 1;
  transform: scale(1);
  transition: opacity .2s ease, transform .3s ease;
}
.fullBrand img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  transform: scale(1.6);
}
.brandMark {
  display: none;
  width: 46px;
  height: 46px;
  padding: 5px;
  background: #fff;
  border-radius: 13px;
  box-shadow: 0 12px 26px rgba(0,0,0,.2);
}
.sidebarCollapsed .brandArea { height: 96px; padding: 22px 14px; }
.sidebarCollapsed .fullBrand { display: none; opacity: 0; transform: scale(.78); }
.sidebarCollapsed .brandMark { display: block; }

.sideNav { position: relative; z-index: 1; flex: 1; padding: 22px 14px; }
.navGroupLabel {
  display: block;
  margin: 0 12px 12px;
  color: rgba(255,255,255,.56);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .17em;
  white-space: nowrap;
  transition: opacity .2s ease;
}
.navItem {
  position: relative;
  width: 100%;
  height: 52px;
  margin: 4px 0;
  padding: 0 15px;
  display: flex;
  align-items: center;
  gap: 13px;
  border: 0;
  border-radius: 13px;
  background: transparent;
  color: rgba(255,255,255,.77);
  cursor: pointer;
  text-align: left;
  font-size: 14px;
  font-weight: 570;
  white-space: nowrap;
  transition: color .2s ease, background .2s ease, transform .2s ease, box-shadow .2s ease;
}
.navItem:hover { color: #fff; background: rgba(255,255,255,.1); transform: translateX(2px); }
.navItem.active {
  color: var(--royal-deep);
  background: #fff;
  box-shadow: 0 10px 28px rgba(3, 27, 112, .22);
}
.navIcon { width: 23px; min-width: 23px; display: grid; place-items: center; }
.navLabel { opacity: 1; transform: translateX(0); transition: opacity .18s ease, transform .28s ease; }
.activeRail { position: absolute; left: -3px; top: 13px; bottom: 13px; width: 4px; background: var(--ferrari); border-radius: 0 6px 6px 0; }
.sidebarCollapsed .navGroupLabel { opacity: 0; }
.sidebarCollapsed .navItem { justify-content: center; padding: 0; }
.sidebarCollapsed .navLabel { position: absolute; opacity: 0; pointer-events: none; transform: translateX(-8px); }

.sidebarFooter {
  position: relative;
  z-index: 1;
  min-height: 132px;
  margin: 0 16px 18px;
  padding-top: 17px;
  border-top: 1px solid rgba(255,255,255,.18);
}
.miniStatus { display: flex; align-items: center; gap: 11px; color: #fff; }
.miniStatus .pulseDot { width: 11px; height: 11px; flex: 0 0 auto; border-radius: 50%; background: #fff; box-shadow: 0 0 0 6px rgba(255,255,255,.13); }
.miniStatus div { display: flex; flex-direction: column; min-width: 0; }
.miniStatus strong { font-size: 12px; }
.miniStatus small { margin-top: 3px; color: rgba(255,255,255,.58); font-size: 9px; white-space: nowrap; }
.sidebarDecoration { position: absolute; right: -8px; bottom: -35px; width: 124px; height: 80px; opacity: .2; transform: rotate(-8deg); }
.sidebarDecoration i { position: absolute; inset: auto 0 0; height: 54px; border: 1px solid #fff; border-radius: 50% 0 0 0; }
.sidebarDecoration i:nth-child(2) { transform: translate(14px, 12px); }
.sidebarDecoration i:nth-child(3) { transform: translate(28px, 24px); }
.sidebarCollapsed .sidebarFooter { margin-inline: 12px; }
.sidebarCollapsed .miniStatus { justify-content: center; }
.sidebarCollapsed .miniStatus div { display: none; }

.topbar {
  position: fixed;
  z-index: 30;
  top: 0;
  right: 0;
  left: var(--sidebar-width);
  height: var(--topbar-height);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 18px;
  background: rgba(255,255,255,.94);
  border-bottom: 1px solid rgba(216,225,240,.9);
  box-shadow: 0 8px 26px rgba(14, 41, 101, .045);
  backdrop-filter: blur(18px);
  transition: left .34s cubic-bezier(.22,.75,.18,1);
}
.sidebarCollapsed .topbar { left: 82px; }
.menuToggle {
  width: 42px;
  height: 42px;
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 5px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
  cursor: pointer;
  box-shadow: 0 5px 14px rgba(15, 43, 110, .07);
  transition: border .2s, box-shadow .2s, transform .2s;
}
.menuToggle:hover { border-color: #b9c9f5; box-shadow: 0 8px 18px rgba(22,72,216,.12); transform: translateY(-1px); }
.menuToggle span { width: 18px; height: 2px; border-radius: 4px; background: var(--royal); transition: transform .32s cubic-bezier(.2,.8,.2,1), width .25s ease, opacity .2s ease; }
.menuToggle.isOpen span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.menuToggle.isOpen span:nth-child(2) { width: 0; opacity: 0; }
.menuToggle.isOpen span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.topbarTitle { min-width: 140px; display: flex; flex-direction: column; }
.topbarTitle span { color: var(--royal); font-size: 9px; font-weight: 850; letter-spacing: .17em; }
.topbarTitle strong { margin-top: 3px; font-size: 18px; letter-spacing: -.02em; }
.topbarTools { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.topSelect {
  position: relative;
  height: 44px;
  min-width: 156px;
  padding: 0 38px 0 13px;
  display: flex;
  align-items: center;
  gap: 9px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
  color: var(--royal-deep);
  box-shadow: 0 5px 14px rgba(15,43,110,.04);
}
.topSelect:focus-within { border-color: #90aaf1; box-shadow: 0 0 0 3px rgba(22,72,216,.09); }
.topSelect select { width: 100%; border: 0; outline: 0; appearance: none; background: transparent; color: inherit; font-size: 12px; font-weight: 650; cursor: pointer; }
.scopeSelect { min-width: 175px; }
.selectChevron { position: absolute; right: 14px; top: 10px; pointer-events: none; color: var(--muted); }
.syncPill {
  height: 44px;
  padding: 0 13px;
  display: flex;
  align-items: center;
  gap: 7px;
  border: 1px solid var(--line);
  border-radius: 12px;

<script>
// ═══════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz1_ohqAABk-RhPb-i67e6eITzk9ve5hNnCI9qICtEuudSCl0Pu3pHtlV0cxMGUsZyKAg/exec';
const MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MESES_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MESES_SHORT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MESES_SHORT_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const READ_ONLY = true;

let S = {
  pessoas: [],
  leads: [],
  session: {},
  mes: '2026-07',
  page: 'dashboard',
  scope: 'all',
  theme: localStorage.getItem('riva_theme') || 'light',
  lang: localStorage.getItem('riva_lang') || 'pt',
  sidebarOpen: window.innerWidth > 760,
  sheetsOK: false,
  syncTimer: null,
  charts: {},
};

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  try { S.session=JSON.parse(localStorage.getItem('riva_sessao')||'{}'); } catch(e) {}
  aplicarTema(S.theme);
  fillUserInfoView();
  carregarLocal();
  renderPage();
  atualizarSidebar();
  setTimeout(carregarSheets, 800);
  setInterval(salvarLocal, 15000);
  setInterval(() => { if(S.sheetsOK) carregarSheets(); }, 30000);
});

function fillUserInfoView(){
  try {
    const s = JSON.parse(localStorage.getItem('riva_sessao')||'{}');
    const nome = s.usuario||'';
    const cargo = s.cargo||'Visualização';
    const nomeCap = nome ? nome.charAt(0).toUpperCase()+nome.slice(1) : 'Usuário';
    const ini = (nomeCap.trim().split(/\s+/).map(w=>w[0]||'').join('').slice(0,2)||'--').toUpperCase();
    const el = document.getElementById('topProfileNome');
    const elIni = document.getElementById('topProfileIni');
    const elCargo = document.getElementById('topProfileCargo');
    const elSide = document.getElementById('sideUserNameView');
    const elSideCargo = document.getElementById('sideUserCargoView');
    if(el) el.textContent = nomeCap;
    if(elIni) elIni.textContent = ini;
    if(elCargo) elCargo.textContent = cargo;
    if(elSide) elSide.textContent = nomeCap||'Núcleo Digital';
    if(elSideCargo) elSideCargo.textContent = cargo;
    const btn = document.getElementById('topProfileBtn');
    if(btn) btn.title = nomeCap;
  } catch(e){}
}

// ═══════════════════════════════════════════
// UTILITÁRIOS
// ═══════════════════════════════════════════
function pct(a,b){ return b ? (a/b)*100 : 0; }
function pctStr(a,b){ return b ? (a/b*100).toFixed(1).replace('.',',')+'%' : '—'; }
function initials(nome){ const p=nome.trim().split(/\s+/); return ((p[0]?.[0]||'')+(p.at(-1)?.[0]||'')).toUpperCase(); }
function fmtMes(mes){ const [y,m]=mes.split('-'); return (S.lang==='en'?MESES_EN:MESES_PT)[parseInt(m)-1]+' '+y; }
function mesLabel(){ return fmtMes(S.mes); }

function normalizeMes(m){
  if(!m) return '';
  if(m.length>7){ const d=new Date(m); if(!isNaN(d)) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
  return m;
}

function soma(arr){
  return arr.reduce((a,l)=>({op:a.op+(+l.op||0),ag:a.ag+(+l.ag||0),vis:a.vis+(+l.vis||0),pas:a.pas+(+l.pas||0),ven:a.ven+(+l.ven||0)})
  ,{op:0,ag:0,vis:0,pas:0,ven:0});
}

function getDesc(id){
  const ids=new Set([id]);
  let changed=true;
  while(changed){ changed=false; S.pessoas.forEach(p=>{ if(p.superior&&ids.has(p.superior)&&!ids.has(p.id)){ids.add(p.id);changed=true;} }); }
  return ids;
}

function totaisFor(pessoa){
  const ids=getDesc(pessoa.id);
  return soma(S.leads.filter(l=>l.mes===S.mes&&ids.has(l.pessoaId)));
}

function leadFor(pessoaId, mes){
  return S.leads.find(l=>l.pessoaId===pessoaId&&l.mes===(mes||S.mes));
}

function roleLabel(cargo){
  if(cargo==='Diretor de Vendas') return 'Diretor';
  if(cargo==='Gerente Regional') return 'Regional';
  return 'Ger. Vendas';
}

function roleBadgeClass(cargo){
  if(cargo==='Diretor de Vendas') return 'roleBadge roleDiretordeVendas';
  if(cargo==='Gerente Regional') return 'roleBadge roleGerenteRegional';
  return 'roleBadge';
}

const PAGE_TITLES = {
  dashboard:'Visão geral', leads:'Resultados de leads',
  team:'Equipe e hierarquia', calculator:'Calculadora de conversão',
  reports:'Relatórios executivos', settings:'Configurações'
};

function navTo(page){
  S.page = page;
  document.querySelectorAll('.navItem[data-page]').forEach(b=>{
    b.classList.remove('active');
    const rail = b.querySelector('.activeRail');
    if(rail) rail.remove();
  });
  const btn = document.querySelector('.navItem[data-page="'+page+'"]');
  if(btn){
    btn.classList.add('active');
    if(!btn.querySelector('.activeRail')){
      const r=document.createElement('span');r.className='activeRail';btn.appendChild(r);
    }
  }
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page]||page;
  if(window.innerWidth<=760){ closeMobileMenu(); }
  renderPage();
}

function toggleSidebar(){
  if(window.innerWidth<=760){
    const sb=document.getElementById('sidebar');
    const bd=document.getElementById('sidebarBackdrop');
    const open=sb.classList.contains('mobileOpen');
    if(open){sb.classList.remove('mobileOpen');bd.style.display='none';}
    else{sb.classList.add('mobileOpen');bd.style.display='block';}
    const tog=document.getElementById('menuToggle');
    tog.classList.toggle('isOpen',!open);
  } else {
    S.sidebarOpen=!S.sidebarOpen;
    atualizarSidebar();
  }
}

function closeMobileMenu(){
  document.getElementById('sidebar').classList.remove('mobileOpen');
  document.getElementById('sidebarBackdrop').style.display='none';
  document.getElementById('menuToggle').classList.remove('isOpen');
}

function atualizarSidebar(){
  const app=document.getElementById('app');
  app.className='app viewOnly '+(S.sidebarOpen?'sidebarExpanded':'sidebarCollapsed');
  document.getElementById('menuToggle').classList.toggle('isOpen',S.sidebarOpen);
}

function onMesChange(){
  const m=document.getElementById('selMes').value;
  const a=String(parseInt(document.getElementById('selAno').value)||new Date().getFullYear());
  S.mes = a+'-'+m;
  document.getElementById('selMesCurrent').textContent = (S.lang==='en'?MESES_SHORT_EN:MESES_SHORT)[parseInt(m)-1];
  // selAnoCurrent removed (input handles display)
  renderPage();
}

function onScopeChange(){
  if(isGerenteVendasView()){
    S.scope=String(S.session.pessoaId||'');
    renderPage();
    return;
  }
  S.scope = document.getElementById('scopeSel').value;
  const opt = document.getElementById('scopeSel').selectedOptions[0];
  document.getElementById('scopeCurrent').textContent = opt ? opt.text : 'Visão geral';
  renderPage();
}

function atualizarScopeSelect(){
  const sel=document.getElementById('scopeSel');
  if(!sel)return;
  if(isGerenteVendasView()){
    const id=String(S.session.pessoaId||'');
    const pessoa=S.pessoas.find(p=>String(p.id)===id);
    S.scope=id;
    sel.innerHTML='<option value="'+id+'">'+(pessoa?pessoa.nome:(S.session.usuario||'Minha visão'))+'</option>';
    sel.value=id;
    document.getElementById('scopeCurrent').textContent=pessoa?pessoa.nome:'Minha visão';
    const wrap=document.querySelector('label.scopeSelect');
    if(wrap)wrap.style.display='none';
    return;
  }
  const wrap=document.querySelector('label.scopeSelect');
  if(wrap)wrap.style.display='';
  sel.innerHTML='<option value="all">Visão geral</option>';
  const og=document.createElement('optgroup');og.label='Por pessoa';
  S.pessoas.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.nome+' · '+roleLabel(p.cargo);og.appendChild(o);});
  sel.appendChild(og);
  if(S.scope&&S.scope!=='all'){sel.value=S.scope;}
  const opt=sel.selectedOptions[0];
  document.getElementById('scopeCurrent').textContent=opt?opt.text:'Visão geral';
}

function getLeadsFiltrados(){
  let ll=S.leads.filter(l=>l.mes===S.mes);
  if(isGerenteVendasView()){
    const id=String(S.session.pessoaId||'');
    return ll.filter(l=>String(l.pessoaId)===id);
  }
  if(S.scope&&S.scope!=='all'){
    const ids=getDesc(S.scope);
    ll=ll.filter(l=>ids.has(l.pessoaId));
  }
  return ll;
}

function renderPage(){
  const c=document.getElementById('pageContent');
  // Destruir charts antigos
  Object.values(S.charts).forEach(ch=>{try{ch.destroy();}catch(e){}});
  S.charts={};
  if(S.page==='dashboard') c.innerHTML=renderDashboard();
  else if(S.page==='leads') c.innerHTML=renderLeadsPage();
  else if(S.page==='team') c.innerHTML=renderTeamPage();
  else if(S.page==='calculator') c.innerHTML=renderCalculatorPage();
  else if(S.page==='reports') c.innerHTML=renderReportsPage();
  else if(S.page==='settings') c.innerHTML=renderSettingsPage();
  afterRender();
  applyInterfaceLanguage();
}

function afterRender(){
  if(S.page==='calculator') initCalcInputs();
  if(S.page==='dashboard') initDashCharts();
  if(S.page==='reports') initReportChart();
}

function initDashCharts(){
  const canvas=document.getElementById('donutChart');
  if(!canvas)return;
  const ll=getLeadsFiltrados();
  const tot=soma(ll);
  const data=[tot.op,tot.ag,tot.vis,tot.pas,tot.ven];
  const colors=['#1e40af','#3b82f6','#0891b2','#eab308','#dc2626'];
  const labels=[tx('Oportunidades','Opportunities'),tx('Agendamentos','Appointments'),tx('Visitas','Visits'),tx('Pastas','Folders'),tx('Vendas','Sales')];
  if(S.charts.donut){ S.charts.donut.destroy(); delete S.charts.donut; }
  S.charts.donut=new Chart(canvas.getContext('2d'),{
    type:'doughnut',
    data:{
      labels,
      datasets:[{
        data,
        backgroundColor:colors,
        borderWidth:3,
        borderColor: document.documentElement.getAttribute('data-theme')==='dark' ? '#141c30' : '#fff',
        hoverBorderWidth:3,
        hoverOffset:4,
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        tooltip:{enabled:false}
      },
      cutout:'62%',
      responsive:false,
      animation:{duration:650,easing:'easeOutQuart'},
      onHover:(evt,els,chart)=>{
        canvas.style.cursor=els.length?'pointer':'default';
        const center=document.querySelector('.donutCenter strong');
        const label=document.querySelector('.donutCenter span');
        if(els.length && center && label){
          center.textContent=data[els[0].index];
          label.textContent=labels[els[0].index];
        } else if(center && label){
          center.textContent=data.reduce((a,b)=>a+b,0);
          label.textContent='movimentos';
        }
      },
      onLeave:()=>resetDonutSegment()
    },
  });
}

function focusDonutSegment(index){
  const chart=S.charts.donut;
  if(!chart)return;
  chart.setActiveElements([{datasetIndex:0,index}]);
  chart.update('none');
  const value=chart.data.datasets[0].data[index];
  const label=chart.data.labels[index];
  const centerValue=document.querySelector('.donutCenter strong');
  const centerLabel=document.querySelector('.donutCenter span');
  if(centerValue)centerValue.textContent=value;
  if(centerLabel)centerLabel.textContent=label;
  document.querySelectorAll('[data-donut-index]').forEach((button,i)=>button.classList.toggle('isActive',i===index));
}

function resetDonutSegment(){
  const chart=S.charts.donut;
  if(!chart)return;
  chart.setActiveElements([]);
  chart.update('none');
  const total=chart.data.datasets[0].data.reduce((sum,value)=>sum+(+value||0),0);
  const centerValue=document.querySelector('.donutCenter strong');
  const centerLabel=document.querySelector('.donutCenter span');
  if(centerValue)centerValue.textContent=total;
  if(centerLabel)centerLabel.textContent=tx('movimentos','movements');
  document.querySelectorAll('[data-donut-index]').forEach(button=>button.classList.remove('isActive'));
}

function previousMonth(mes){
  const [y,m]=mes.split('-').map(Number);
  const d=new Date(y,m-2,1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function renderLeadsPage(){
  const ll=S.leads.filter(l=>l.mes===S.mes);
  const rows=S.pessoas.map(p=>{const l=ll.find(x=>x.pessoaId===p.id);return{person:p,lead:l};}).filter(r=>r.lead);
  const tot=soma(rows.map(r=>r.lead));
  return `<div class="modulePage">
    <section class="moduleHeader">
      <div><span class="eyebrow">CONSULTA OPERACIONAL</span><h1>Resultados de leads</h1>
      <p>Acompanhe os resultados de cada pessoa no período selecionado.</p></div>
    </section>
    <section class="moduleStats">
      <article><span>Pessoas com lançamento</span><strong>${rows.length}</strong><small>de ${S.pessoas.length}</small></article>
      <article><span>Oportunidades registradas</span><strong>${tot.op}</strong><small>no período selecionado</small></article>
      <article><span>Conversão para visitas</span><strong>${pctStr(tot.vis,tot.op)}</strong><small>${tot.vis} visitas realizadas</small></article>
      <article class="red"><span>Vendas confirmadas</span><strong>${tot.ven}</strong><small>${pctStr(tot.ven,tot.op)}</small></article>
    </section>
    <section class="panel modulePanel">
      <div class="toolbarRow">
        <div><span class="eyebrow">BASE DE RESULTADOS</span><h3>Dados por pessoa</h3></div>
        <label class="searchField">${svgIcon('search',17)}<input id="leadsSearch" placeholder="Buscar pessoa..." oninput="filterLeadsTable(this.value)"></label>
      </div>
      <div class="tableWrap"><table id="leadsTable">
        <thead><tr><th>Pessoa</th><th>Cargo</th><th>Superior</th><th>OP</th><th>AG</th><th>VIS</th><th>PAS</th><th>VEN</th><th>AG/OP</th><th>VEN/OP</th></tr></thead>
        <tbody>
          ${rows.length?rows.map(r=>leadRow(r.person,r.lead)).join(''):`<tr><td colspan="10">
            <div class="emptyState">${svgIcon('leads',28)}<strong>Nenhum lançamento encontrado</strong>
            <span>Não há resultados disponíveis neste período.</span>
            </div></td></tr>`}
        </tbody>
      </table></div>
    </section>
  </div>`;
}

function leadRow(p,l){
  const sup=S.pessoas.find(x=>x.id===p.superior);
  return `<tr>
    <td><button class="personCell" onclick="openProfile('${p.id}')"><span>${initials(p.nome)}</span><strong>${p.nome}</strong></button></td>
    <td><span class="${roleBadgeClass(p.cargo)}">${roleLabel(p.cargo)}</span></td>
    <td>${sup?sup.nome:'—'}</td>
    <td><strong>${l.op}</strong></td><td>${l.ag}</td><td>${l.vis}</td><td>${l.pas}</td>
    <td><strong class="redText">${l.ven}</strong></td>
    <td>${pctStr(l.ag,l.op)}</td><td><strong>${pctStr(l.ven,l.op)}</strong></td>
  </tr>`;
}

function filterLeadsTable(q){
  const rows=document.querySelectorAll('#leadsTable tbody tr');
  rows.forEach(tr=>{tr.style.display=tr.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';});
}

let calcValues={op:120,ag:40,vis:12,pas:3,ven:1};

function renderCalculatorPage(){
  return `<div class="modulePage">
    <section class="moduleHeader">
      <div><span class="eyebrow">SIMULAÇÃO DE PERFORMANCE</span><h1>Calculadora de conversão</h1>

    </section>
    <div class="calculatorGrid">
      <section class="panel formPanel">
        <div class="panelHeader"><div><span class="eyebrow">ENTRADAS DO FUNIL</span><h3>Valores base</h3></div></div>
        <div class="formBody">
          <label class="formField full"><span>Usar resultados de uma pessoa</span>
            <select id="calcPessoa" onchange="calcLoadPessoa(this.value)">
              <option value="custom">Simulação livre</option>
              ${S.pessoas.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}
            </select>
          </label>
          <div class="formGrid">
            ${['op','ag','vis','pas','ven'].map((k,i)=>{
              const labels=['Oportunidades','Agendamentos','Visitas','Pastas','Vendas'];
              return `<label class="formField${i===4?' last':''}"><span>${labels[i]}</span>
                <input type="number" min="0" id="calc_${k}" value="${calcValues[k]}" oninput="calcUpdate()">
              </label>`;
            }).join('')}
          </div>
        </div>
      </section>
      <section class="panel resultsPanel">
        <div class="panelHeader"><div><span class="eyebrow">RESULTADO DA SIMULAÇÃO</span><h3>Taxas calculadas</h3></div>
        <span class="liveBadge"><i></i> TEMPO REAL</span></div>
        <div class="resultCards" id="calcResults"></div>
        <div class="projectionBox" id="calcProjection"></div>
      </section>
    </div>
    <section class="panel simulatorFunnel">
      <div class="panelHeader"><div><span class="eyebrow">VISUALIZAÇÃO DO CENÁRIO</span><h3>Funil projetado</h3></div></div>
      <div class="projectedFunnel" id="calcFunnel"></div>
    </section>
  </div>`;
}

function initCalcInputs(){ calcUpdate(); }

function calcLoadPessoa(id){
  if(id==='custom')return;
  const ids=getDesc(id);
  const totals=soma(S.leads.filter(x=>x.mes===S.mes&&ids.has(x.pessoaId)));
  calcValues={op:totals.op,ag:totals.ag,vis:totals.vis,pas:totals.pas,ven:totals.ven};
  ['op','ag','vis','pas','ven'].forEach(k=>{const el=document.getElementById('calc_'+k);if(el)el.value=calcValues[k];});
  calcUpdate();
}

function calcUpdate(){
  ['op','ag','vis','pas','ven'].forEach(k=>{const el=document.getElementById('calc_'+k);if(el)calcValues[k]=Math.max(0,+el.value||0);});
  const v=calcValues;
  const convs=[
    ['Agendamento / Oportunidade',v.ag,v.op],
    ['Visita / Agendamento',v.vis,v.ag],
    ['Pasta / Visita',v.pas,v.vis],
    ['Venda / Pasta',v.ven,v.pas],
  ];
  const resEl=document.getElementById('calcResults');
  if(resEl) resEl.innerHTML=convs.map(([l,a,b],i)=>`
    <article class="${i===3?'red':''}">
      <span>${l}</span><strong>${pctStr(a,b)}</strong>
      <div><i style="width:${Math.min(pct(a,b),100)}%"></i></div>
      <small>${a} de ${b}</small>
    </article>`).join('');
  const projEl=document.getElementById('calcProjection');
  if(projEl) projEl.innerHTML=`<span>Conversão total OP → VEN</span><strong>${pctStr(v.ven,v.op)}</strong>
    <p>Com ${v.op} oportunidades, este cenário gera <b>${v.ven} venda${v.ven!==1?'s':''}</b>.</p>`;
  const funEl=document.getElementById('calcFunnel');
  if(funEl){
    const keys=['op','ag','vis','pas','ven'];
    const labels=['Oportunidades','Agendamentos','Visitas','Pastas','Vendas'];
    funEl.innerHTML=keys.map((k,i)=>`
      <div style="width:${100-i*9}%" class="projectedStage stage${i}">
        <span>${labels[i]}</span><strong>${v[k]}</strong>
        <em>${i===0?'100%':pctStr(v[k],v.op)}</em>
      </div>`).join('');
  }
}

function initReportChart(){}

function toggleReg(id){
  const i=selectedRegIds.indexOf(id);
  if(i>=0)selectedRegIds.splice(i,1);else selectedRegIds.push(id);
  renderPage();
}

function toggleAllReg(){
  const all=S.pessoas.filter(p=>p.cargo==='Gerente Regional').map(r=>r.id);
  selectedRegIds=selectedRegIds.length===all.length?[all[0]]:all;
  renderPage();
}

function gerarPDF(){
  document.getElementById('syncPill').style.display='none';
  setTimeout(()=>{window.print();setTimeout(()=>{document.getElementById('syncPill').style.display='';;},500);},200);
}

function gerarExcel(){
  const regionals=S.pessoas.filter(p=>p.cargo==='Gerente Regional');

  const rows=S.pessoas
    .filter(p=>p.cargo==='Gerente de Vendas'&&selSet.has(p.superior))
    .map(p=>{const t=soma(S.leads.filter(l=>l.mes===S.mes&&l.pessoaId===p.id));const reg=S.pessoas.find(x=>x.id===p.superior);return{person:p,regional:reg,totals:t};});
  const wb=XLSX.utils.book_new();
  const navy='0c2264',red='ff1e1e',white='FFFFFF',line='dfe6f2';
  const hdrStyle={fill:{fgColor:{rgb:navy}},font:{bold:true,color:{rgb:white},sz:9},alignment:{horizontal:'center'}};
  const titleStyle={fill:{fgColor:{rgb:navy}},font:{bold:true,color:{rgb:white},sz:13},alignment:{horizontal:'left'}};
  // Aba 1: Resumo
  const tot=soma(rows.map(r=>r.totals));
  const ws1data=[

    [],

function openModalLead(pessoaId){
  if(READ_ONLY){toast(tx('Este acesso é somente para visualização.','This access is read-only.'));return;}
  const modal=document.getElementById('modalLead');
  document.getElementById('modalLeadTitle').textContent='Lançar resultados';
  // Popular select de pessoas
  const sel=document.getElementById('leadPessoa');
  sel.innerHTML='<option value="">Selecione...</option>';
  S.pessoas.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.nome+' · '+roleLabel(p.cargo);sel.appendChild(o);});
  // Setar mês atual
  document.getElementById('leadMes').value=S.mes.split('-')[1];
  document.getElementById('leadAno').value=S.mes.split('-')[0];
  // Se veio com pessoaId, preencher
  if(pessoaId){sel.value=pessoaId;onLeadPessoaChange();}
  else{['lOp','lAg','lVis','lPas','lVen'].forEach(id=>{document.getElementById(id).value=0;});}
  updateModalConv();
  modal.style.display='flex';
}

function openModalLeadEdit(pessoaId){ openModalLead(pessoaId); }

function onLeadPessoaChange(){
  const pid=document.getElementById('leadPessoa').value;
  const mes=document.getElementById('leadAno').value+'-'+document.getElementById('leadMes').value;
  const l=S.leads.find(x=>x.pessoaId===pid&&x.mes===mes);
  if(l){
    document.getElementById('lOp').value=l.op;
    document.getElementById('lAg').value=l.ag;
    document.getElementById('lVis').value=l.vis;
    document.getElementById('lPas').value=l.pas;
    document.getElementById('lVen').value=l.ven;
  } else {
    ['lOp','lAg','lVis','lPas','lVen'].forEach(id=>document.getElementById(id).value=0);
  }
  updateModalConv();
}

function updateModalConv(){
  const op=+document.getElementById('lOp').value||0;
  const ven=+document.getElementById('lVen').value||0;
  document.getElementById('modalConv').textContent=pctStr(ven,op);
}

['lOp','lAg','lVis','lPas','lVen'].forEach(id=>{
  document.addEventListener('DOMContentLoaded',()=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('input',updateModalConv);
  });
});

function salvarLead(){
  if(READ_ONLY){toast(tx('Alterações estão bloqueadas neste acesso.','Changes are blocked for this access.'),true);return;}
  const pid=document.getElementById('leadPessoa').value;
  if(!pid){toast('Selecione uma pessoa.',true);return;}
  const mes=document.getElementById('leadAno').value+'-'+document.getElementById('leadMes').value;
  const lead={pessoaId:pid,mes,op:+document.getElementById('lOp').value||0,ag:+document.getElementById('lAg').value||0,vis:+document.getElementById('lVis').value||0,pas:+document.getElementById('lPas').value||0,ven:+document.getElementById('lVen').value||0};
  const idx=S.leads.findIndex(l=>l.pessoaId===pid&&l.mes===mes);
  if(idx>=0)S.leads[idx]=lead;else S.leads.push(lead);
  salvarLocal();sincSheets();
  closeModal('modalLead');
  renderPage();
  toast('Resultados salvos com sucesso.');
}

function excluirLead(pid){
  if(READ_ONLY){toast(tx('Alterações estão bloqueadas neste acesso.','Changes are blocked for this access.'),true);return;}
  if(!confirm('Excluir leads desta pessoa neste mês?'))return;
  S.leads=S.leads.filter(l=>!(l.pessoaId===pid&&l.mes===S.mes));
  salvarLocal();sincSheets();renderPage();toast('Lançamento removido.');
}

function openModalPessoa(){
  if(READ_ONLY){toast(tx('Este acesso é somente para visualização.','This access is read-only.'));return;}
  document.getElementById('pessoaEditId').value='';
  document.getElementById('pessoaNome').value='';

function openModalPessoaEdit(id){
  if(READ_ONLY){openProfile(id);return;}
  const p=S.pessoas.find(x=>x.id===id);if(!p)return;
  document.getElementById('pessoaEditId').value=id;
  document.getElementById('pessoaNome').value=p.nome;

function onCargoChange(){
  const cargo=document.getElementById('pessoaCargo').value;
  const sf=document.getElementById('superiorField');
  const sl=document.getElementById('superiorLabel');
  const sel=document.getElementById('pessoaSuperior');
  const hierMap={'Gerente Regional':['Diretor de Vendas','Diretor responsável *'],'Gerente de Vendas':['Gerente Regional','Regional responsável *']};
  if(!hierMap[cargo]){sf.style.display='none';return;}
  sf.style.display='block';
  sl.textContent=hierMap[cargo][1];
  const [supCargo]=hierMap[cargo];
  sel.innerHTML='<option value="">Selecione...</option>';
  S.pessoas.filter(p=>p.cargo===supCargo).forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.nome;sel.appendChild(o);});
}

function salvarPessoa(){
  if(READ_ONLY){toast(tx('Alterações estão bloqueadas neste acesso.','Changes are blocked for this access.'),true);return;}
  const nome=document.getElementById('pessoaNome').value.trim();
  const cargo=document.getElementById('pessoaCargo').value;
  const superior=document.getElementById('pessoaSuperior').value;
  const editId=document.getElementById('pessoaEditId').value;
  if(!nome){toast('Digite o nome.',true);return;}
  if(['Gerente Regional','Gerente de Vendas'].includes(cargo)&&!superior){toast('Selecione o superior.',true);return;}
  if(editId){
    const idx=S.pessoas.findIndex(p=>p.id===editId);
    if(idx>=0)S.pessoas[idx]={id:editId,nome,cargo,superior};
  } else {
    S.pessoas.push({id:Date.now().toString(),nome,cargo,superior});
  }
  salvarLocal();sincSheets();
  closeModal('modalPessoa');
  atualizarScopeSelect();
  renderPage();
  toast(editId?'Cadastro atualizado.':'Pessoa cadastrada com sucesso.');
}

function excluirPessoa(id){
  if(READ_ONLY){toast(tx('Alterações estão bloqueadas neste acesso.','Changes are blocked for this access.'),true);return;}
  const ids=getDesc(id);
  const msg=ids.size>1?'Excluir esta pessoa, sua equipe e todos os lançamentos?':'Excluir esta pessoa e todos os seus lançamentos?';
  if(!confirm(msg))return;
  S.pessoas=S.pessoas.filter(p=>!ids.has(p.id));
  S.leads=S.leads.filter(l=>!ids.has(l.pessoaId));
  salvarLocal();sincSheets();atualizarScopeSelect();renderPage();toast('Cadastro removido.');
}

const PT_TO_EN = new Map(LANGUAGE_PAIRS);
const EN_TO_PT = new Map(LANGUAGE_PAIRS.map(([pt,en])=>[en,pt]));

function translatedText(value){
  const clean=(value||'').trim();
  if(!clean)return value;
  const dictionary=S.lang==='en'?PT_TO_EN:EN_TO_PT;
  let translated=dictionary.get(clean);
  if(!translated && S.lang==='en'){
    translated=clean.replace(/^(\d+) vendas$/, '$1 sales').replace(/^(\d+) venda$/, '$1 sale').replace(/^(\d+) registros$/, '$1 records');
  } else if(!translated && S.lang==='pt'){
    translated=clean.replace(/^(\d+) sales$/, '$1 vendas').replace(/^(\d+) sale$/, '$1 venda').replace(/^(\d+) records$/, '$1 registros');
  }
  if(!translated || translated===clean)return value;
  return value.replace(clean,translated);
}

  document.documentElement.lang=S.lang==='en'?'en':'pt-BR';
  const walker=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);
  const nodes=[];
  while(walker.nextNode()){
    const parent=walker.currentNode.parentElement;
    if(parent && !['SCRIPT','STYLE'].includes(parent.tagName))nodes.push(walker.currentNode);
  }
  nodes.forEach(node=>{node.nodeValue=translatedText(node.nodeValue);});
  document.querySelectorAll('[placeholder],[title],[aria-label]').forEach(el=>{
    ['placeholder','title','aria-label'].forEach(attr=>{
      if(el.hasAttribute(attr))el.setAttribute(attr,translatedText(el.getAttribute(attr)));
    });
  });
}

// TOAST
// ═══════════════════════════════════════════
let toastTimer;
function toast(msg,err){
  const el=document.getElementById('toast');
  el.style.display='flex';
  el.style.background=err?'var(--ferrari)':'var(--royal-deep)';
  el.classList.toggle('isError',!!err);
  el.setAttribute('role',err?'alert':'status');
  el.querySelector(':scope > span:first-child').textContent=err?'!':'✓';
  document.getElementById('toastMsg').textContent=msg;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.display='none';},3000);
}

// ═══════════════════════════════════════════
// LOCAL STORAGE
// ═══════════════════════════════════════════
function salvarLocal(){
  localStorage.setItem(viewStorageKey(),JSON.stringify({pessoas:S.pessoas,leads:S.leads}));
}

function carregarLocal(){
  try{
    const raw=localStorage.getItem(viewStorageKey());
    if(raw){
      const d=JSON.parse(raw);
      S.pessoas=d.pessoas||[];
      S.leads=(d.leads||[]).map(l=>({...l,mes:normalizeMes(l.mes)}));
    }
    // Migrar dados do sistema antigo (riva_v2)
    if(!S.pessoas.length && !isGerenteVendasView()){
      const old=localStorage.getItem('riva_v2');
      if(old){
        const d=JSON.parse(old);
        S.pessoas=d.pessoas||[];
        S.leads=(d.leads||[]).map(l=>({...l,mes:normalizeMes(l.mes)}));
        salvarLocal();
      }
    }
  }catch(e){console.error('carregarLocal:',e);}
  aplicarPrivacidadeLeads();
  atualizarScopeSelect();
}

function isGerenteVendasView(){
  return String((S.session||{}).cargo||'')==='Gerente de Vendas';
}

function viewStorageKey(){
  return isGerenteVendasView()
    ? 'riva_bi_view_'+String(S.session.pessoaId||'sem_id')
    : 'riva_bi_v1';
}

function aplicarPrivacidadeLeads(){
  if(!isGerenteVendasView())return;
  const id=String(S.session.pessoaId||'');
  S.pessoas=S.pessoas.filter(p=>String(p.id)===id);
  S.leads=S.leads.filter(l=>String(l.pessoaId)===id);
  S.scope=id;
}

// ═══════════════════════════════════════════
// GOOGLE SHEETS
// ═══════════════════════════════════════════
function setSyncStatus(status){
  const pill=document.getElementById('syncPill');
  const label=document.getElementById('syncLabel');
  const dot=document.getElementById('syncDot');
  const icon=document.getElementById('syncIcon');
  if(!pill)return;
  pill.className='syncPill '+status;
  const labels={
    loading:tx('Conectando','Connecting'),
    online:tx('Atualizado','Updated'),
    saving:tx('Salvando','Saving'),
    local:tx('Dados locais','Local data')
  };
  if(label)label.textContent=labels[status]||status;
  if(dot){dot.style.background=status==='online'?'var(--success)':status==='saving'?'#FFB800':status==='loading'?'#aaa':'#aaa';}
  if(icon&&(status==='loading'||status==='saving')){icon.style.animation='spin 1s linear infinite'}
  else if(icon){icon.style.animation='';}
  document.getElementById('syncTime').textContent=status==='online'?formatFortaleza():'—';
}

function formatFortaleza(){
  return new Intl.DateTimeFormat(S.lang==='en'?'en-US':'pt-BR',{timeZone:'America/Fortaleza',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date())+' · Fortaleza';
}

function carregarSheets(){
  setSyncStatus('loading');
  window._sCB=function(j){
    const sc=document.getElementById('_sTag');if(sc)sc.parentNode.removeChild(sc);
    if(!j||j.status!=='ok'||!j.data){setSyncStatus('local');return;}
    const d=j.data;
    if(d.pessoas&&d.pessoas.length>0){
      S.pessoas=d.pessoas;
      S.leads=(d.leads||[]).map(l=>{return{...l,mes:normalizeMes(l.mes)};}); 
      aplicarPrivacidadeLeads();
      salvarLocal();atualizarScopeSelect();renderPage();
      setSyncStatus('online');S.sheetsOK=true;
    } else {
      setSyncStatus('online');S.sheetsOK=true;
      salvarSheets();
    }
  };
  const sc=document.createElement('script');sc.id='_sTag';
  sc.src=SHEETS_URL+'?callback=_sCB&t='+Date.now();
  sc.onerror=function(){setSyncStatus('local');const s=document.getElementById('_sTag');if(s)s.parentNode.removeChild(s);};
  document.head.appendChild(sc);
}

function salvarSheets(){
  setSyncStatus(S.sheetsOK?'online':'local');
  return false;
}

function sincSheets(force){
  carregarSheets();
}
