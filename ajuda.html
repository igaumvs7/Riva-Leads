.hHero .eyebrow{font-size:10px;font-weight:850;letter-spacing:.14em;text-transform:uppercase;opacity:.7}
.hHero h1{font-size:28px;font-weight:900;letter-spacing:-.02em;margin:6px 0 8px;line-height:1}
.hHero p{font-size:14px;opacity:.85;max-width:640px;line-height:1.55}

.hSection{background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px 28px;margin-bottom:16px;box-shadow:0 6px 18px rgba(17,42,101,.04)}
[data-theme="dark"] .hSection{background:#12151f;border-color:#292f3e}
.hSectHead{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.hSectHead .icn{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,rgba(22,72,216,.14),rgba(22,72,216,.04));display:grid;place-items:center;color:var(--royal);font-size:22px}
[data-theme="dark"] .hSectHead .icn{background:rgba(126,163,255,.15);color:#7ea3ff}
.hSectHead h2{font-size:20px;font-weight:900;letter-spacing:-.02em;line-height:1;margin-bottom:4px}
.hSectHead p{font-size:12px;color:var(--muted)}

.hStep{padding:14px 0;border-top:1px solid #eef1f7;display:flex;gap:14px}
.hStep:first-child{border-top:0}
[data-theme="dark"] .hStep{border-color:#242b3b}
.hStepNum{width:28px;height:28px;flex-shrink:0;border-radius:8px;background:var(--royal);color:#fff;font-weight:800;display:grid;place-items:center;font-size:12px}
.hStepBody h4{font-size:14px;font-weight:750;color:var(--ink);margin-bottom:5px;letter-spacing:-.01em}
[data-theme="dark"] .hStepBody h4{color:#eef2fb}
.hStepBody p{font-size:13px;color:#5a6780;line-height:1.6}
[data-theme="dark"] .hStepBody p{color:#b5bdcd}
.hStepBody strong{color:var(--royal-deep);font-weight:750}
[data-theme="dark"] .hStepBody strong{color:#7ea3ff}
.hStepBody ul{margin:8px 0 0 18px;padding:0}
.hStepBody li{font-size:13px;color:#5a6780;line-height:1.7;margin-bottom:4px}
[data-theme="dark"] .hStepBody li{color:#b5bdcd}

.hTip{margin-top:16px;padding:14px 16px;background:rgba(255,183,0,.08);border-left:3px solid #eab308;border-radius:8px;font-size:12px;color:#78350f;line-height:1.55}
.hTip strong{color:#78350f}
[data-theme="dark"] .hTip{background:rgba(234,179,8,.08);color:#fde68a}
[data-theme="dark"] .hTip strong{color:#fde68a}

.hInfo{margin-top:16px;padding:14px 16px;background:rgba(22,72,216,.06);border-left:3px solid var(--royal);border-radius:8px;font-size:12px;color:var(--royal-deep);line-height:1.55}
[data-theme="dark"] .hInfo{background:rgba(126,163,255,.08);color:#c9d8ff}

.hFeatures{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-top:14px}
.hFeature{padding:14px 16px;background:#f4f7fb;border-radius:10px}
[data-theme="dark"] .hFeature{background:#0d1018}
.hFeature strong{display:block;font-size:12px;font-weight:750;color:var(--royal-deep);margin-bottom:4px}
[data-theme="dark"] .hFeature strong{color:#7ea3ff}
.hFeature small{font-size:11px;color:var(--muted);line-height:1.5;display:block}

@media(max-width:600px){.hHero{padding:22px 24px}.hHero h1{font-size:22px}.hSection{padding:20px}}

/* Profile Dropdown */
.profileWrap{position:relative}
.profileMenu{position:absolute;top:calc(100% + 8px);right:0;min-width:200px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 50px rgba(4,12,40,.25);padding:6px;z-index:50;display:none;animation:pmIn .18s ease-out}
.profileMenu.open{display:block}
@keyframes pmIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
[data-theme="dark"] .profileMenu{background:#181d2a;border-color:#292f3e}
.profileMenu button{width:100%;padding:10px 14px;background:transparent;border:0;border-radius:8px;text-align:left;font-size:13px;font-weight:650;color:var(--ink);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:10px;transition:.15s}
.profileMenu button:hover{background:#f4f7fb}
[data-theme="dark"] .profileMenu button{color:#eef2fb}
[data-theme="dark"] .profileMenu button:hover{background:#0d1018}
.profileMenu button.danger{color:#dc2626}
.profileMenu button.danger:hover{background:rgba(220,38,38,.08)}
.profileMenu .pmSep{height:1px;background:#eef1f7;margin:4px 0}
[data-theme="dark"] .profileMenu .pmSep{background:#242b3b}

<script>
var S = { sec:'inicio' };
document.addEventListener('DOMContentLoaded', function(){
  if(window.RivaConfig){ var c=window.RivaConfig.get(); if(c.tema) window.RivaConfig.aplicarTema(c.tema); }
  secTo('inicio');
});
function secTo(sec){
  S.sec = sec;
  document.querySelectorAll('.navItem').forEach(function(b){ b.classList.remove('active'); var r=b.querySelector('.activeRail'); if(r) r.remove(); });
  var btn = document.querySelector('.navItem[data-page="'+sec+'"]');
  if(btn){ btn.classList.add('active'); var r=document.createElement('span'); r.className='activeRail'; btn.appendChild(r); }
  var titles = { inicio:'Bem-vindo', entrar:'Como entrar', presenca:'Presença nos Stands', leads:'Leads Online', vendas:'Gestão de Vendas', reunioes:'Agenda Riva', config:'Configurações', problemas:'Problemas comuns' };
  document.getElementById('pageTitle').textContent = titles[sec] || 'Ajuda';
  if(window.innerWidth<=760) closeMobileMenu();
  document.getElementById('pageContent').innerHTML = CONTENT[sec] || CONTENT.inicio;
  window.scrollTo({top:0, behavior:'smooth'});
}
function toggleSidebar(){
  if(window.innerWidth<=760){
    var sb=document.getElementById('sidebar'), bd=document.getElementById('sidebarBackdrop');
    var open=sb.classList.contains('mobileOpen');
    if(open){ sb.classList.remove('mobileOpen'); bd.style.display='none'; }
    else{ sb.classList.add('mobileOpen'); bd.style.display='block'; }
  } else {
    document.getElementById('app').classList.toggle('sidebarExpanded');
    document.getElementById('app').classList.toggle('sidebarCollapsed');
  }
}
function closeMobileMenu(){ document.getElementById('sidebar').classList.remove('mobileOpen'); document.getElementById('sidebarBackdrop').style.display='none'; }
