<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{
  min-height:100vh;display:grid;place-items:center;
  background:#060c18;
  background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(13,31,109,.85) 0%,transparent 55%),
             radial-gradient(ellipse 60% 40% at 80% 100%,rgba(22,72,216,.4) 0%,transparent 55%),
             #060c18;
}
.loginWrap{position:relative;z-index:1;width:100%;max-width:420px;padding:24px 16px}
.loginCard{
  background:rgba(10,16,35,.85);border:1px solid rgba(255,255,255,.08);
  border-radius:24px;padding:40px 36px;
  box-shadow:0 0 0 1px rgba(22,72,216,.15),0 32px 80px rgba(0,0,0,.6);
  backdrop-filter:blur(20px);
  animation:cardIn .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.loginLogo{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.loginLogo img{width:52px;height:52px;border-radius:14px;box-shadow:0 4px 20px rgba(22,72,216,.35)}
.loginLogo strong{display:block;font-size:17px;font-weight:900;letter-spacing:1.5px;color:#fff;line-height:1}
.loginLogo span{font-size:10px;font-weight:600;letter-spacing:1.5px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-top:4px;display:block}
.loginHeading{margin-bottom:28px}
.loginHeading h1{font-size:28px;font-weight:800;color:#fff;line-height:1.1}
.loginHeading p{font-size:13px;color:rgba(255,255,255,.4);margin-top:6px}
.formGroup{margin-bottom:16px}
.formGroup label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:8px}
.inputWrap{position:relative}
.inputWrap svg.fi{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.25);pointer-events:none}
.inputWrap input{width:100%;padding:13px 44px;border:1.5px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.05);color:#fff;font-size:14px;font-weight:500;outline:none;transition:.2s}
.inputWrap input:focus{border-color:rgba(22,72,216,.7);box-shadow:0 0 0 3px rgba(22,72,216,.2);background:rgba(22,72,216,.08)}
.inputWrap input::placeholder{color:rgba(255,255,255,.2);font-weight:400}
.togglePwd{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);background:none;border:none;padding:6px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:.2s}
.togglePwd:hover{color:rgba(255,255,255,.7)}
.manter{display:flex;align-items:center;gap:8px;margin-bottom:14px;margin-top:-4px}
.manter input{width:16px;height:16px;accent-color:#1648d8;cursor:pointer}
.manter label{font-size:12px;color:rgba(255,255,255,.35);cursor:pointer}
.btnLogin{width:100%;padding:14px;background:linear-gradient(135deg,#1648d8 0%,#0d33a8 100%);color:#fff;font-size:14px;font-weight:800;border:none;border-radius:13px;cursor:pointer;box-shadow:0 8px 28px rgba(22,72,216,.45);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btnLogin:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(22,72,216,.55)}
.btnLogin:disabled{opacity:.6;pointer-events:none}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;flex-shrink:0}
.btnLogin.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.errorBox{display:none;align-items:center;gap:10px;background:rgba(255,30,30,.1);border:1px solid rgba(255,30,30,.25);border-radius:10px;padding:12px 14px;margin-top:14px;color:#ff6b6b;font-size:13px;font-weight:500}
.errorBox.show{display:flex;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.loginFooter{text-align:center;margin-top:20px;font-size:11px;color:rgba(255,255,255,.2)}
.loginFooter strong{color:rgba(22,72,216,.7)}
.portalWrap{position:relative;z-index:1;width:100%;max-width:880px;padding:24px 16px;display:none;animation:cardIn .4s cubic-bezier(.22,1,.36,1) both}
.portalHeader{display:flex;align-items:center;gap:14px;margin-bottom:36px}
.portalHeader img{width:46px;height:46px;border-radius:12px;box-shadow:0 4px 16px rgba(22,72,216,.3)}
.portalHeader strong{font-size:20px;font-weight:900;color:#fff}
.portalHeader span{font-size:12px;color:rgba(255,255,255,.4);display:block;margin-top:2px}
.logoutBtn{margin-left:auto;padding:9px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.logoutBtn:hover{border-color:rgba(255,30,30,.4);color:#ff6b6b}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(22,72,216,.8);text-transform:uppercase}
.portalGreeting h1{font-size:30px;font-weight:900;color:#fff;margin-top:6px}
.portalGreeting p{font-size:13px;color:rgba(255,255,255,.4);margin-top:8px;margin-bottom:28px}
.moduleGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.moduleCard{background:rgba(10,16,35,.7);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:24px;text-decoration:none;display:flex;flex-direction:column;gap:14px;transition:all .25s;position:relative}
.moduleCard:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.4);border-color:rgba(22,72,216,.3)}
.moduleCard.locked{opacity:.35;pointer-events:none}
.cardIcon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px}
.cardIcon.blue{background:rgba(22,72,216,.15);border:1px solid rgba(22,72,216,.2)}
.cardIcon.red{background:rgba(255,30,30,.12);border:1px solid rgba(255,30,30,.2)}
.cardIcon.green{background:rgba(21,164,111,.12);border:1px solid rgba(21,164,111,.2)}
.cardIcon.purple{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.2)}
.cardTitle{font-size:16px;font-weight:800;color:#fff}
.cardDesc{font-size:12px;color:rgba(255,255,255,.4);line-height:1.5}
.cardBadge{align-self:flex-start;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}

.director{background:rgba(255,30,30,.12);color:#ff6b6b;border:1px solid rgba(255,30,30,.2)}
@media(max-width:600px){.loginCard{padding:28px 22px}.moduleGrid{grid-template-columns:1fr}}
</style>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz1_ohqAABk-RhPb-i67e6eITzk9ve5hNnCI9qICtEuudSCl0Pu3pHtlV0cxMGUsZyKAg/exec';
let S = {pessoa:null};

function togglePwd(){
  const inp=document.getElementById('inputSenha');
  const show=document.getElementById('eyeShow');
  const hide=document.getElementById('eyeHide');
  if(inp.type==='password'){inp.type='text';show.style.display='none';hide.style.display='block';}
  else{inp.type='password';show.style.display='block';hide.style.display='none';}
}

function mostrarErro(msg){
  const box=document.getElementById('errorBox');
  document.getElementById('errorMsg').textContent=msg;
  box.classList.remove('show');
  void box.offsetWidth;
  box.classList.add('show');
}

function setLoading(on){
  const btn=document.getElementById('btnLogin');
  const lbl=document.getElementById('btnLabel');
  const arr=document.getElementById('arrowIcon');
  btn.disabled=on;
  btn.classList.toggle('loading',on);
  lbl.textContent=on?'Verificando...':'Entrar no sistema';
  arr.style.display=on?'none':'';
}

function fazerLogin(){
  const usuario=document.getElementById('inputUsuario').value.trim();
  const senha=document.getElementById('inputSenha').value.trim();
  document.getElementById('errorBox').classList.remove('show');
  if(!usuario||!senha){mostrarErro('Preencha usuário e senha.');return;}

  setLoading(true);

  window._loginCB=function(j){
    const sc=document.getElementById('_lt');if(sc)sc.parentNode.removeChild(sc);
    setLoading(false);
    if(j&&j.status==='ok'){
      const dias=document.getElementById('manterLogado').checked?30:1;
      localStorage.setItem('riva_sessao',JSON.stringify({
        pessoaId:j.pessoaId,cargo:j.cargo||'',usuario,ts:Date.now(),dias
      }));
      mostrarPortal(j.pessoaId,j.cargo);
    } else {
      mostrarErro((j&&j.msg)||'Usuário ou senha incorretos.');
    }
  };

  const sc=document.createElement('script');
  sc.id='_lt';
  sc.src=SHEETS_URL+'?action=login&usuario='+encodeURIComponent(usuario)+'&senha='+encodeURIComponent(senha)+'&callback=_loginCB&t='+Date.now();
  sc.onerror=function(){
    const s=document.getElementById('_lt');if(s)s.parentNode.removeChild(s);
    setLoading(false);
    mostrarErro('Sem conexão. Tente novamente.');
  };
  document.head.appendChild(sc);
}

function mostrarPortal(pessoaId,cargo){
  const isAdmin   =cargo==='Administrador';
  const isDiretor =cargo==='Diretor de Vendas'||isAdmin;
  const h=new Date().getHours();
  const greet=h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
  const sessao=JSON.parse(localStorage.getItem('riva_sessao')||'{}');
  const nome=sessao.usuario||'';

  document.getElementById('loginWrap').style.display='none';
  document.getElementById('portalWrap').style.display='block';
  document.getElementById('portalSaudacao').textContent=greet+', '+(nome.charAt(0).toUpperCase()+nome.slice(1))+'!';
  document.getElementById('portalCargo').textContent=isAdmin?'Feito por · Igor Vivas':cargo;
  document.getElementById('portalDesc').textContent=isAdmin?'Acesso total ao sistema.':isDiretor?'Acesso completo a todos os módulos.':'Acesse os módulos do seu perfil.';

  const mods=[
    ...(isAdmin?[{titulo:'Administração',desc:'Gerencie usuários e acessos.',icon:'⚙️',color:'purple',href:'admin.html',badge:'Admin',badgeClass:'director',lock:false}]:[]),
    {titulo:'Painel Diretor',desc:'Visão executiva, rankings e alertas.',icon:'📊',color:'red',href:'diretor.html',badge:isDiretor?'Acesso total':'Bloqueado',badgeClass:isDiretor?'all':'director',lock:!isDiretor},
    {titulo:'Leads Online',desc:'Oportunidades, agendamentos, visitas, pastas e vendas do Núcleo Digital.',icon:'📋',color:'blue',href:isDiretor?'index.html':'view.html',badge:isDiretor?'Acesso total':'Visualização',badgeClass:isDiretor?'all':'view',lock:false},
    {titulo:'Gestão de Vendas',desc:'Registre vendas com todos os detalhes.',icon:'🏆',color:'green',href:'vendas.html',badge:isDiretor?'Acesso total':'Visualização',badgeClass:isDiretor?'all':'view',lock:false},
    {titulo:'Configurações',desc:'Tema, idioma e preferências do sistema.',icon:'⚙️',color:'purple',href:'configuracoes.html',badge:'Sistema',badgeClass:'all',lock:false},
  ];

  document.getElementById('moduleGrid').innerHTML=mods.map(function(m){
    return '<a href="'+(m.lock?'javascript:void(0)':m.href)+'" class="moduleCard'+(m.lock?' locked':'')+'">'
      +'<div class="cardIcon '+m.color+'">'+m.icon+'</div>'
      +'<div><div class="cardTitle">'+m.titulo+'</div><div class="cardDesc">'+m.desc+'</div></div>'
      +'<span class="cardBadge '+m.badgeClass+'">'+m.badge+'</span>'
      +'</a>';
  }).join('');
}

function logout(){
  localStorage.removeItem('riva_sessao');
  document.getElementById('portalWrap').style.display='none';
  document.getElementById('loginWrap').style.display='block';
  document.getElementById('inputUsuario').value='';
  document.getElementById('inputSenha').value='';
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('inputSenha').type='password';
  document.getElementById('eyeShow').style.display='block';
  document.getElementById('eyeHide').style.display='none';
}

window.addEventListener('DOMContentLoaded',function(){
  const raw=localStorage.getItem('riva_sessao');
  if(raw){
    try{
      const s=JSON.parse(raw);
      const dias=s.dias||1;
      if(Date.now()-s.ts<dias*24*60*60*1000){
        mostrarPortal(s.pessoaId,s.cargo);
        return;
      }
    }catch(e){}
    localStorage.removeItem('riva_sessao');
  }
});
</script>
