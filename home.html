<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --royal:#1648d8;--royal-dark:#0d33a8;--royal-deep:#071f6d;
  --ferrari:#ff1e1e;--ink:#0c1e48;--muted:#687695;
  --line:#dfe6f2;--canvas:#f0f4ff;--white:#fff;
  --success:#15a46f;--warn:#e6a817;
}
[data-theme="dark"]{
  --ink:#e8eeff;--muted:#8a9bcc;--line:#1e2a45;
  --canvas:#080d1a;--white:#111827;
}
html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{
  background:var(--canvas);
  display:grid;place-items:center;min-height:100vh;
  transition:background .3s;
}

/* ── BACKGROUND ANIMADO ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%, rgba(22,72,216,.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 80%, rgba(255,30,30,.07) 0%, transparent 55%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(22,72,216,.05) 0%, transparent 70%);
  animation:bgShift 8s ease-in-out infinite alternate;
}
@keyframes bgShift{
  from{transform:scale(1)}
  to{transform:scale(1.06)}
}

/* ── LOGIN CARD ── */
.loginWrap{
  position:relative;z-index:1;
  width:100%;max-width:440px;padding:24px 16px;
}
.loginCard{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:24px;
  padding:44px 40px;
  box-shadow:0 24px 64px rgba(7,31,109,.10), 0 4px 16px rgba(7,31,109,.06);
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(24px) scale(.97)}
  to{opacity:1;transform:none}
}

/* ── LOGO ── */
.loginLogo{
  display:flex;align-items:center;gap:14px;margin-bottom:36px;
}
.loginLogo img{width:52px;height:52px;border-radius:14px;box-shadow:0 6px 20px rgba(22,72,216,.3)}
.loginLogo div strong{display:block;font-size:18px;font-weight:900;letter-spacing:1.5px;color:var(--ink);line-height:1}
.loginLogo div span{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:3px;display:block}

/* ── HEADING ── */
.loginHeading{margin-bottom:32px}
.loginHeading h1{font-size:26px;font-weight:800;color:var(--ink);line-height:1.1}
.loginHeading p{font-size:13px;color:var(--muted);margin-top:6px}

/* ── FORM ── */
.formGroup{margin-bottom:18px}
.formGroup label{
  display:block;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
}
.inputWrap{position:relative}
.inputWrap svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;
}
.inputWrap input{
  width:100%;padding:13px 14px 13px 44px;
  border:1.5px solid var(--line);border-radius:12px;
  background:var(--canvas);color:var(--ink);
  font-size:14px;font-weight:500;
  transition:border .2s,box-shadow .2s;outline:none;
}
.inputWrap input:focus{
  border-color:var(--royal);
  box-shadow:0 0 0 3px rgba(22,72,216,.12);
  background:var(--white);
}
.inputWrap input::placeholder{color:var(--muted);font-weight:400}

/* Toggle senha */
.togglePwd{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);cursor:pointer;background:none;border:none;padding:4px;
}
.togglePwd:hover{color:var(--royal)}

/* ── BOTÃO ENTRAR ── */
.btnLogin{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--royal) 0%,var(--royal-dark) 100%);
  color:#fff;font-size:14px;font-weight:800;letter-spacing:.5px;
  border:none;border-radius:14px;cursor:pointer;
  box-shadow:0 8px 24px rgba(22,72,216,.3);
  transition:all .2s;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:8px;
}
.btnLogin:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(22,72,216,.4)}
.btnLogin:active{transform:translateY(0)}
.btnLogin.loading{pointer-events:none;opacity:.8}
.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
.btnLogin.loading .spinner{display:block}
.btnLogin.loading .btnLabel{opacity:.6}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ERRO ── */
.errorBox{
  display:none;align-items:center;gap:10px;
  background:rgba(255,30,30,.08);border:1px solid rgba(255,30,30,.2);
  border-radius:10px;padding:12px 14px;margin-top:16px;
  color:#cc0000;font-size:13px;font-weight:500;
  animation:shake .4s ease;
}
.errorBox.show{display:flex}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── FOOTER ── */
.loginFooter{
  text-align:center;margin-top:28px;
  font-size:11px;color:var(--muted);letter-spacing:.5px;
}
.loginFooter strong{color:var(--royal);font-weight:700}

/* ── TEMA TOGGLE ── */
.themeBtn{
  position:fixed;top:20px;right:20px;z-index:10;
  width:42px;height:42px;border-radius:12px;
  background:var(--white);border:1px solid var(--line);
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  transition:all .2s;
}
.themeBtn:hover{color:var(--royal);border-color:var(--royal)}

/* ── PORTAL CARDS (após login) ── */
.portalWrap{
  position:relative;z-index:1;width:100%;max-width:900px;padding:24px 16px;
  display:none;
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
.portalHeader{
  display:flex;align-items:center;gap:16px;margin-bottom:40px;
}
.portalHeader img{width:48px;height:48px;border-radius:13px}
.portalHeader div strong{font-size:22px;font-weight:900;color:var(--ink)}
.portalHeader div span{font-size:13px;color:var(--muted);display:block;margin-top:2px}
.portalHeader .logoutBtn{
  margin-left:auto;padding:10px 18px;border-radius:10px;
  border:1.5px solid var(--line);background:var(--white);
  color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;
  transition:.2s;
}
.portalHeader .logoutBtn:hover{border-color:var(--ferrari);color:var(--ferrari)}

.portalGreeting{margin-bottom:32px}
.portalGreeting .eyebrow{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--royal);text-transform:uppercase}
.portalGreeting h1{font-size:32px;font-weight:900;color:var(--ink);margin-top:6px;line-height:1}
.portalGreeting p{font-size:14px;color:var(--muted);margin-top:8px}

.moduleGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}
.moduleCard{
  background:var(--white);border:1.5px solid var(--line);border-radius:20px;
  padding:28px 24px;cursor:pointer;text-decoration:none;
  box-shadow:0 4px 20px rgba(7,31,109,.06);
  transition:all .25s;
  display:flex;flex-direction:column;gap:16px;
  position:relative;overflow:hidden;
}
.moduleCard::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(22,72,216,.03) 0%,transparent 60%);
  opacity:0;transition:.25s;
}
.moduleCard:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 40px rgba(7,31,109,.12);
  border-color:var(--royal);
}
.moduleCard:hover::before{opacity:1}
.moduleCard.locked{
  opacity:.45;cursor:not-allowed;pointer-events:none;
}
.cardIcon{
  width:52px;height:52px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
.cardIcon.blue{background:rgba(22,72,216,.1);color:var(--royal)}
.cardIcon.red{background:rgba(255,30,30,.1);color:var(--ferrari)}
.cardIcon.green{background:rgba(21,164,111,.1);color:var(--success)}
.cardIcon.purple{background:rgba(123,0,153,.1);color:#7B0099}
.cardTitle{font-size:17px;font-weight:800;color:var(--ink)}
.cardDesc{font-size:12px;color:var(--muted);line-height:1.5}
.cardBadge{
  align-self:flex-start;padding:4px 10px;border-radius:6px;
  font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
}
.cardBadge.all{background:rgba(22,72,216,.1);color:var(--royal)}
.cardBadge.view{background:rgba(21,164,111,.1);color:var(--success)}
.cardBadge.director{background:rgba(255,30,30,.1);color:var(--ferrari)}
.lockIcon{position:absolute;top:16px;right:16px;color:var(--muted);opacity:.5}

[data-theme="dark"] .moduleCard{background:#111827;border-color:#1e2a45}
[data-theme="dark"] .loginCard{background:#111827;border-color:#1e2a45}
[data-theme="dark"] .inputWrap input{background:#0d1425;border-color:#1e2a45;color:#e8eeff}
[data-theme="dark"] .inputWrap input:focus{background:#111827}

@media(max-width:600px){
  .loginCard{padding:32px 24px}
  .moduleGrid{grid-template-columns:1fr}
}
</style>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzhEqHsbzemeVhCfGIhdgZgrqRZcsSK7V8eIHUnk2xdLCAQbL0WLLK0bq9eGqnuo8DtDw/exec';
let S = { pessoa:null, dados:null };

// ── TEMA ──────────────────────────────────────────────────
function toggleTheme(){
  const th = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',th);
  localStorage.setItem('riva_theme',th);
  const icon = document.getElementById('themeIcon');
  icon.innerHTML = th==='dark'
    ? '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>'
    : '<path d="M20 15.5A8.5 8.5 0 0 1 8.5 4 8.5 8.5 0 1 0 20 15.5Z"/>';
}
document.documentElement.setAttribute('data-theme', localStorage.getItem('riva_theme')||'light');

// ── HASH SHA-256 ──────────────────────────────────────────
async function sha256(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── LOGIN ─────────────────────────────────────────────────
function focusSenha(){ document.getElementById('inputSenha').focus(); }

function togglePwd(){
  const inp = document.getElementById('inputSenha');
  inp.type = inp.type==='password'?'text':'password';
}

async function fazerLogin(){
  const usuario = document.getElementById('inputUsuario').value.trim();
  const senha   = document.getElementById('inputSenha').value;
  const errBox  = document.getElementById('errorBox');
  const btn     = document.getElementById('btnLogin');

  errBox.classList.remove('show');
  if(!usuario||!senha){ mostrarErro('Preencha usuário e senha.'); return; }

  btn.classList.add('loading');
  document.getElementById('arrowIcon').style.display='none';

  const hash = await sha256(senha);

  window._loginCB = function(j){
    const sc = document.getElementById('_loginTag');
    if(sc) sc.parentNode.removeChild(sc);
    btn.classList.remove('loading');
    document.getElementById('arrowIcon').style.display='';

    if(j.status==='ok'){
      localStorage.setItem('riva_sessao', JSON.stringify({
        pessoaId: j.pessoaId,
        usuario,
        ts: Date.now()
      }));
      carregarDados(j.pessoaId);
    } else {
      mostrarErro(j.msg||'Credenciais inválidas.');
    }
  };

  const sc = document.createElement('script');
  sc.id  = '_loginTag';
  sc.src = SHEETS_URL+'?action=login&usuario='+encodeURIComponent(usuario)+'&hash='+hash+'&callback=_loginCB&t='+Date.now();
  sc.onerror = function(){
    btn.classList.remove('loading');
    mostrarErro('Sem conexão com o servidor.');
    const s=document.getElementById('_loginTag');if(s)s.parentNode.removeChild(s);
  };
  document.head.appendChild(sc);
}

function mostrarErro(msg){
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').classList.add('show');
}

// ── CARREGAR DADOS ────────────────────────────────────────
function carregarDados(pessoaId){
  window._dataCB = function(j){
    const sc=document.getElementById('_dataTag');if(sc)sc.parentNode.removeChild(sc);
    if(j.status==='ok'){
      S.dados = j.data;
      S.pessoa = j.data.pessoas.find(p=>p.id===pessoaId) || null;
      mostrarPortal();
    } else {
      mostrarErro('Erro ao carregar dados: '+j.msg);
    }
  };
  const sc=document.createElement('script');
  sc.id='_dataTag';
  sc.src=SHEETS_URL+'?action=getData&callback=_dataCB&t='+Date.now();
  sc.onerror=function(){mostrarErro('Erro de conexão.');const s=document.getElementById('_dataTag');if(s)s.parentNode.removeChild(s);};
  document.head.appendChild(sc);
}

// ── PORTAL ────────────────────────────────────────────────
function mostrarPortal(){
  const p = S.pessoa;
  if(!p){ mostrarErro('Conta não encontrada.'); return; }

  const cargo  = p.cargo || '';
  const isDiretor  = cargo === 'Diretor de Vendas';
  const isRegional = cargo === 'Gerente Regional';
  const isGerente  = cargo === 'Gerente de Vendas';

  document.getElementById('loginWrap').style.display='none';
  const pw = document.getElementById('portalWrap');
  pw.style.display='block';

  const hora = new Date().getHours();
  const saudacao = hora<12?'Bom dia':'hora<18'?'Boa tarde':'Boa noite';
  const greet = hora<12?'Bom dia':'hora>=18'?'Boa noite':'Boa tarde';
  document.getElementById('portalSaudacao').textContent = greet+', '+p.nome.split(' ')[0]+'!';
  document.getElementById('portalCargo').textContent = cargo;
  document.getElementById('portalDesc').textContent = isDiretor
    ? 'Você tem acesso completo a todos os módulos.'
    : isRegional
      ? 'Você pode visualizar os módulos da sua equipe.'
      : 'Você pode visualizar seus próprios resultados.';

  const modulos = [
    {
      titulo:'Painel Diretor',
      desc:'Visão executiva consolidada, alertas, rankings e evolução mensal.',
      icon:'📊', color:'red',
      href:'diretor.html',
      badge:'Somente Diretor',
      badgeClass:'director',
      acesso: isDiretor,
      bloqueado: !isDiretor,
    },
    {
      titulo:'Módulo Leads',
      desc:'Lance, edite e acompanhe as oportunidades de toda a equipe.',
      icon:'📋', color:'blue',
      href: isDiretor ? 'index.html' : 'view.html',
      badge: isDiretor ? 'Acesso total' : 'Visualização',
      badgeClass: isDiretor ? 'all' : 'view',
      acesso: true,
      bloqueado: false,
    },
    {
      titulo:'Gestão de Vendas',
      desc:'Registre vendas com corretor, empreendimento, valor e data.',
      icon:'🏆', color:'green',
      href:'vendas.html',
      badge: isDiretor ? 'Acesso total' : 'Visualização',
      badgeClass: isDiretor ? 'all' : 'view',
      acesso: true,
      bloqueado: false,
    },
  ];

  const grid = document.getElementById('moduleGrid');
  grid.innerHTML = modulos.map(m=>`
    <a href="${m.bloqueado?'javascript:void(0)':m.href}"
       class="moduleCard${m.bloqueado?' locked':''}"
       title="${m.bloqueado?'Sem permissão de acesso':m.titulo}">
      <div class="cardIcon ${m.color}">${m.icon}</div>
      <div>
        <div class="cardTitle">${m.titulo}</div>
        <div class="cardDesc">${m.desc}</div>
      </div>
      <span class="cardBadge ${m.badgeClass}">${m.badge}</span>
      ${m.bloqueado?'<svg class="lockIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>':''}
    </a>
  `).join('');
}

function logout(){
  localStorage.removeItem('riva_sessao');
  S = { pessoa:null, dados:null };
  document.getElementById('portalWrap').style.display='none';
  document.getElementById('loginWrap').style.display='block';
  document.getElementById('inputUsuario').value='';
  document.getElementById('inputSenha').value='';
  document.getElementById('errorBox').classList.remove('show');
}

// ── AUTO-LOGIN (sessão salva) ─────────────────────────────
window.addEventListener('DOMContentLoaded', ()=>{
  const sessao = localStorage.getItem('riva_sessao');
  if(sessao){
    try{
      const s = JSON.parse(sessao);
      // Sessão válida por 8 horas
      if(Date.now() - s.ts < 8*60*60*1000){
        carregarDados(s.pessoaId);
        return;
      }
    }catch(e){}
  }
  // Aplicar tema
  const th = localStorage.getItem('riva_theme')||'light';
  document.documentElement.setAttribute('data-theme',th);
});
</script>
