*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --royal:#1648d8;--royal-dark:#0d33a8;--royal-deep:#071f6d;
  --ferrari:#ff1e1e;--ink:#0c1e48;--muted:#687695;
  --line:#dfe6f2;--canvas:#f0f4ff;--white:#fff;
  --success:#15a46f;
}
/* ── TEMA ESCURO PADRÃO (gradiente azul-escuro puxado pro preto) ── */
html,body{
  height:100%;
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}
body{
  min-height:100vh;
  display:grid;
  place-items:center;
  background:#060c18;
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%,   rgba(13,31,109,.85) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(22,72,216,.4)  0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #060c18 0%, #060c18 100%);
  position:relative;overflow:hidden;
}

/* partículas sutis no fundo */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(2px 2px at 15% 25%, rgba(100,150,255,.15) 0%, transparent 100%),
    radial-gradient(2px 2px at 75% 60%, rgba(100,150,255,.1) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 80%, rgba(200,220,255,.08) 0%, transparent 100%);
  pointer-events:none;
}

/* ── CARD ── */
.loginWrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;padding:24px 16px;
}
.loginCard{
  background:rgba(10,16,35,.85);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:40px 36px;
  box-shadow:
    0 0 0 1px rgba(22,72,216,.15),
    0 32px 80px rgba(0,0,0,.6),
    0 8px 24px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.06);
  backdrop-filter:blur(20px);
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(.97)}
  to{opacity:1;transform:none}
}

/* ── LOGO ── */
.loginLogo{
  display:flex;align-items:center;gap:14px;margin-bottom:32px;
}
.loginLogo img{
  width:52px;height:52px;border-radius:14px;
  box-shadow:0 4px 20px rgba(22,72,216,.35),0 0 0 1px rgba(255,255,255,.1);
}
.loginLogo div strong{
  display:block;font-size:17px;font-weight:900;
  letter-spacing:1.5px;color:#ffffff;line-height:1;
}
.loginLogo div span{
  font-size:10px;font-weight:600;letter-spacing:1.5px;
  color:rgba(255,255,255,.45);text-transform:uppercase;
  margin-top:4px;display:block;
}

/* ── HEADING ── */
.loginHeading{margin-bottom:28px}
.loginHeading h1{
  font-size:28px;font-weight:800;color:#ffffff;line-height:1.1;
}
.loginHeading p{font-size:13px;color:rgba(255,255,255,.45);margin-top:6px}

/* ── FORM ── */
.formGroup{margin-bottom:16px}
.formGroup label{
  display:block;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,.4);margin-bottom:8px;
}
.inputWrap{position:relative}
.inputWrap svg.fieldIcon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,.3);pointer-events:none;
}
.inputWrap input{
  width:100%;padding:13px 44px 13px 44px;
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:12px;
  background:rgba(255,255,255,.05);
  color:#ffffff;
  font-size:14px;font-weight:500;
  transition:border .2s,box-shadow .2s,background .2s;
  outline:none;
}
.inputWrap input:focus{
  border-color:rgba(22,72,216,.7);
  box-shadow:0 0 0 3px rgba(22,72,216,.2);
  background:rgba(22,72,216,.08);
}
.inputWrap input::placeholder{color:rgba(255,255,255,.2);font-weight:400}

/* toggle senha */
.togglePwd{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,.3);background:none;border:none;
  padding:6px;cursor:pointer;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;
}
.togglePwd:hover{color:rgba(255,255,255,.7);background:rgba(255,255,255,.06)}

/* ── BOTÃO ── */
.btnLogin{
  width:100%;padding:14px;margin-top:10px;
  background:linear-gradient(135deg,#1648d8 0%,#0d33a8 100%);
  color:#fff;font-size:14px;font-weight:800;letter-spacing:.5px;
  border:none;border-radius:13px;cursor:pointer;
  box-shadow:0 8px 28px rgba(22,72,216,.45),inset 0 1px 0 rgba(255,255,255,.15);
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btnLogin:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 36px rgba(22,72,216,.55),inset 0 1px 0 rgba(255,255,255,.2);
}
.btnLogin:active{transform:translateY(0)}
.btnLogin.loading{pointer-events:none;opacity:.7}
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;display:none;flex-shrink:0;
}
.btnLogin.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ERRO ── */
.errorBox{
  display:none;align-items:center;gap:10px;
  background:rgba(255,30,30,.1);
  border:1px solid rgba(255,30,30,.25);
  border-radius:10px;padding:12px 14px;margin-top:14px;
  color:#ff6b6b;font-size:13px;font-weight:500;
  animation:shake .4s ease;
}
.errorBox.show{display:flex}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ── FOOTER ── */
.loginFooter{
  text-align:center;margin-top:24px;
  font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.3px;
}
.loginFooter strong{color:rgba(22,72,216,.8);font-weight:700}

/* ── PORTAL ── */
.portalWrap{
  position:relative;z-index:1;
  width:100%;max-width:880px;padding:24px 16px;
  display:none;
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
.portalHeader{
  display:flex;align-items:center;gap:14px;margin-bottom:36px;

.portalHeader img{width:46px;height:46px;border-radius:12px;box-shadow:0 4px 16px rgba(22,72,216,.3)}
.portalHeader div strong{font-size:20px;font-weight:900;color:#fff}
.portalHeader div span{font-size:12px;color:rgba(255,255,255,.4);display:block;margin-top:2px}
.logoutBtn{
  margin-left:auto;padding:9px 16px;border-radius:10px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.5);font-size:12px;font-weight:700;cursor:pointer;
  transition:.2s;
}
.logoutBtn:hover{border-color:rgba(255,30,30,.4);color:#ff6b6b;background:rgba(255,30,30,.06)}

.portalGreeting{margin-bottom:28px}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(22,72,216,.8);text-transform:uppercase}
.portalGreeting h1{font-size:30px;font-weight:900;color:#fff;margin-top:6px;line-height:1}
.portalGreeting p{font-size:13px;color:rgba(255,255,255,.4);margin-top:8px}

.moduleGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:14px;
}
.moduleCard{
  background:rgba(10,16,35,.7);
  border:1px solid rgba(255,255,255,.07);
  border-radius:18px;padding:24px;
  cursor:pointer;text-decoration:none;
  box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);
  transition:all .25s;
  display:flex;flex-direction:column;gap:14px;
  position:relative;overflow:hidden;
}
.moduleCard::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(22,72,216,.06) 0%,transparent 60%);
  opacity:0;transition:.25s;
}
.moduleCard:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 40px rgba(0,0,0,.4),0 0 0 1px rgba(22,72,216,.3);
  border-color:rgba(22,72,216,.3);
}
.moduleCard:hover::before{opacity:1}
.moduleCard.locked{opacity:.35;cursor:not-allowed;pointer-events:none;filter:grayscale(.3)}
.cardIcon{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.cardIcon.blue{background:rgba(22,72,216,.15);border:1px solid rgba(22,72,216,.2)}
.cardIcon.red{background:rgba(255,30,30,.12);border:1px solid rgba(255,30,30,.2)}
.cardIcon.green{background:rgba(21,164,111,.12);border:1px solid rgba(21,164,111,.2)}
.cardTitle{font-size:16px;font-weight:800;color:#fff}
.cardDesc{font-size:12px;color:rgba(255,255,255,.4);line-height:1.5}
.cardBadge{
  align-self:flex-start;padding:4px 10px;border-radius:6px;
  font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
}
.cardBadge.all{background:rgba(22,72,216,.2);color:#6b9fff;border:1px solid rgba(22,72,216,.3)}
.cardBadge.view{background:rgba(21,164,111,.15);color:#4dbb8a;border:1px solid rgba(21,164,111,.25)}
.cardBadge.director{background:rgba(255,30,30,.12);color:#ff6b6b;border:1px solid rgba(255,30,30,.2)}
.lockIcon{position:absolute;top:14px;right:14px;color:rgba(255,255,255,.2)}

@media(max-width:600px){
  .loginCard{padding:28px 22px}
  .moduleGrid{grid-template-columns:1fr}
  .portalGreeting h1{font-size:24px}
}
</style>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzhEqHsbzemeVhCfGIhdgZgrqRZcsSK7V8eIHUnk2xdLCAQbL0WLLK0bq9eGqnuo8DtDw/exec';
let S = { pessoa:null };

// ── TOGGLE SENHA ─────────────────────────────────────────────
function togglePwd(){
  const inp  = document.getElementById('inputSenha');
  const show = document.getElementById('eyeIconShow');
  const hide = document.getElementById('eyeIconHide');
  const btn  = document.getElementById('togglePwdBtn');
  if(inp.type === 'password'){
    inp.type = 'text';
    show.style.display = 'none';
    hide.style.display = 'block';
    btn.style.color = 'rgba(255,255,255,.7)';
  } else {
    inp.type = 'password';
    show.style.display = 'block';
    hide.style.display = 'none';
    btn.style.color = 'rgba(255,255,255,.3)';
  }
}

// ── SHA-256 ──────────────────────────────────────────────────
async function sha256(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── ERRO ─────────────────────────────────────────────────────
function mostrarErro(msg){
  const box = document.getElementById('errorBox');
  document.getElementById('errorMsg').textContent = msg;
  box.classList.remove('show');
  void box.offsetWidth; // reset animation
  box.classList.add('show');
}

// ── LOGIN ────────────────────────────────────────────────────
async function fazerLogin(){
  const usuario = document.getElementById('inputUsuario').value.trim();
  const senha   = document.getElementById('inputSenha').value;
  const btn     = document.getElementById('btnLogin');

  document.getElementById('errorBox').classList.remove('show');

  if(!usuario || !senha){ mostrarErro('Preencha usuário e senha.'); return; }

  btn.classList.add('loading');
  document.getElementById('arrowIcon').style.display = 'none';

  const hash = await sha256(senha);

  window._loginCB = function(j){
    const sc = document.getElementById('_loginTag');
    if(sc) sc.parentNode.removeChild(sc);
    btn.classList.remove('loading');
    document.getElementById('btnLabel').textContent = 'Entrar no sistema';
    document.getElementById('arrowIcon').style.display = '';

    if(j.status === 'ok'){
      localStorage.setItem('riva_sessao', JSON.stringify({
        pessoaId: j.pessoaId, usuario, ts: Date.now()
      }));
      carregarDados(j.pessoaId, j.cargo);
    } else {
      mostrarErro(j.msg || 'Credenciais inválidas.');
    }
  };

  const sc = document.createElement('script');
  sc.id  = '_loginTag';
  sc.src = SHEETS_URL
    + '?action=login'
    + '&usuario=' + encodeURIComponent(usuario)
    + '&hash='    + hash
    + '&callback=_loginCB&t=' + Date.now();
  sc.onerror = function(){
    btn.classList.remove('loading');
    document.getElementById('arrowIcon').style.display = '';
    mostrarErro('Sem conexão com o servidor.');
    const s=document.getElementById('_loginTag');if(s)s.parentNode.removeChild(s);
  };
  document.head.appendChild(sc);
}

// ── CARREGAR DADOS ───────────────────────────────────────────
function carregarDados(pessoaId){
  window._dataCB = function(j){
    const sc = document.getElementById('_dataTag');
    if(sc) sc.parentNode.removeChild(sc);
    if(j.status === 'ok'){
      S.pessoa = (j.data.pessoas||[]).find(p=>p.id===pessoaId) || null;
      mostrarPortal();
    } else {
      mostrarErro('Erro ao carregar dados: ' + (j.msg||''));
    }
  };
  const sc = document.createElement('script');
  sc.id  = '_dataTag';
  sc.src = SHEETS_URL + '?action=getData&callback=_dataCB&t=' + Date.now();
  sc.onerror = function(){
    mostrarErro('Erro de conexão ao carregar dados.');
    const s=document.getElementById('_dataTag');if(s)s.parentNode.removeChild(s);
  };
  document.head.appendChild(sc);
}

// ── PORTAL ───────────────────────────────────────────────────
function mostrarPortal(){
  const p = S.pessoa;
  if(!p){ mostrarErro('Conta não encontrada.'); return; }

  const cargo      = p.cargo || '';
  const isDiretor  = cargo === 'Diretor de Vendas';

  // Saudação por hora
  const h = new Date().getHours();
  const greet = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';

  document.getElementById('loginWrap').style.display  = 'none';
  document.getElementById('portalWrap').style.display = 'block';
  document.getElementById('portalSaudacao').textContent = greet + ', ' + p.nome.split(' ')[0] + '!';
  document.getElementById('portalCargo').textContent  = cargo;
  document.getElementById('portalDesc').textContent   = isDiretor
    ? 'Você tem acesso completo a todos os módulos do sistema.'
    : 'Acesse os módulos disponíveis para o seu perfil.';

  const modulos = [
    {
      titulo:'Painel Diretor',
      desc:'Visão executiva consolidada, alertas, rankings e evolução mensal.',
      icon:'📊', color:'red',
      href:'diretor.html',
      badge:'Somente Diretor', badgeClass:'director',
      bloqueado: !isDiretor,
    },
    {
      titulo:'Módulo Leads',
      desc:'Acompanhe oportunidades, agendamentos, visitas, pastas e vendas.',
      icon:'📋', color:'blue',
      href: isDiretor ? 'index.html' : 'view.html',
      badge: isDiretor ? 'Acesso total' : 'Visualização',
      badgeClass: isDiretor ? 'all' : 'view',
      bloqueado: false,
    },
    {
      titulo:'Gestão de Vendas',
      desc:'Registre vendas com corretor, empreendimento, valor e data.',
      icon:'🏆', color:'green',
      href:'vendas.html',
      badge: isDiretor ? 'Acesso total' : 'Visualização',
      badgeClass: isDiretor ? 'all' : 'view',
      bloqueado: false,
    },
  ];

  document.getElementById('moduleGrid').innerHTML = modulos.map(m => `
    <a href="${m.bloqueado ? 'javascript:void(0)' : m.href}"
       class="moduleCard${m.bloqueado ? ' locked' : ''}"
       title="${m.bloqueado ? 'Sem permissão de acesso' : m.titulo}">
      <div class="cardIcon ${m.color}">${m.icon}</div>
      <div>
        <div class="cardTitle">${m.titulo}</div>
        <div class="cardDesc">${m.desc}</div>
      </div>
      <span class="cardBadge ${m.badgeClass}">${m.badge}</span>
      ${m.bloqueado ? '<svg class="lockIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' : ''}
    </a>
  `).join('');
}

// ── LOGOUT ────────────────────────────────────────────────────
function logout(){
  localStorage.removeItem('riva_sessao');
  S = { pessoa:null };
  document.getElementById('portalWrap').style.display = 'none';
  document.getElementById('loginWrap').style.display  = 'block';
  document.getElementById('inputUsuario').value = '';
  document.getElementById('inputSenha').value   = '';
  document.getElementById('errorBox').classList.remove('show');
  // Reset toggle senha
  document.getElementById('inputSenha').type = 'password';
  document.getElementById('eyeIconShow').style.display = 'block';
  document.getElementById('eyeIconHide').style.display = 'none';
  document.getElementById('togglePwdBtn').style.color  = 'rgba(255,255,255,.3)';
}

// ── AUTO-LOGIN ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', ()=>{
  const raw = localStorage.getItem('riva_sessao');
  if(raw){
    try{
      const s = JSON.parse(raw);
      if(Date.now() - s.ts < 8*60*60*1000){
        carregarDados(s.pessoaId, s.cargo);
        return;
      }
    }catch(e){}
    localStorage.removeItem('riva_sessao');
  }
});
</script>
