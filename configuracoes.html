<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background .3s,color .3s}
body.claro{background:#f4f7fb;color:#0c1e48}
body.escuro{background:#0d1117;color:#e2e8f0}
.card{width:min(600px,95vw);border-radius:20px;overflow:hidden;box-shadow:0 24px 60px rgba(2,15,57,.18)}
body.claro .card{background:#fff;border:1px solid #dfe6f2}
body.escuro .card{background:#161b22;border:1px solid #30363d}
header{padding:20px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid;}
body.claro header{border-color:#edf1f7}
body.escuro header{border-color:#30363d}
header img{width:42px;height:42px;border-radius:10px;object-fit:contain;background:#fff;padding:4px}
header div strong{font-size:16px;font-weight:800}
header div small{font-size:11px;color:#687695;display:block;margin-top:2px}
header a{margin-left:auto;height:36px;padding:0 14px;display:inline-flex;align-items:center;gap:6px;border:1px solid #dfe6f2;border-radius:9px;font-size:11px;font-weight:700;color:#687695;text-decoration:none;transition:.2s}
header a:hover{border-color:#aebff1;color:#1648d8}
.body{padding:24px}
.section{margin-bottom:28px}
.section:last-child{margin-bottom:0}
.sLabel{font-size:10px;font-weight:850;letter-spacing:.14em;text-transform:uppercase;color:#1648d8;margin-bottom:14px;display:block}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.opt{padding:16px;border-radius:14px;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;flex-direction:column;gap:6px}
body.claro .opt{background:#f4f7fb}
body.escuro .opt{background:#0d1117}
.opt.sel{border-color:#1648d8;background:#edf2ff}
body.escuro .opt.sel{background:rgba(22,72,216,.15)}
.opt .preview{height:56px;border-radius:9px;margin-bottom:4px;display:flex;gap:6px;overflow:hidden}
.opt .p-sidebar{width:30px;border-radius:6px 0 0 6px}
.opt .p-content{flex:1;border-radius:0 6px 6px 0}
.preview.light .p-sidebar{background:linear-gradient(165deg,#174ee4,#082a94)}
.preview.light .p-content{background:#f4f7fb}
.preview.dark .p-sidebar{background:linear-gradient(165deg,#0d1117,#161b22)}
.preview.dark .p-content{background:#0d1117;border:1px solid #30363d}
.opt .oName{font-size:13px;font-weight:750}
.opt .oDesc{font-size:11px;color:#687695}
.opt.sel .oName{color:#1648d8}
.radio{width:18px;height:18px;border-radius:50%;border:2px solid #dfe6f2;display:inline-flex;align-items:center;justify-content:center;margin-top:4px;align-self:flex-end}
.opt.sel .radio{border-color:#1648d8;background:#1648d8}
.opt.sel .radio::after{content:"";width:7px;height:7px;border-radius:50%;background:#fff}


body.claro 
body.escuro 

body.escuro 




.saveRow{margin-top:24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.bPri{height:44px;padding:0 22px;display:inline-flex;align-items:center;gap:8px;border:1px solid #1648d8;border-radius:11px;color:#fff;background:linear-gradient(145deg,#1b54ec,#123cc2);font-size:12px;font-weight:720;cursor:pointer;transition:transform .2s,box-shadow .2s}
.bPri:hover{transform:translateY(-2px);box-shadow:0 13px 25px rgba(22,72,216,.26)}
.bSec{height:44px;padding:0 18px;display:inline-flex;align-items:center;gap:8px;border:1px solid #dfe6f2;border-radius:11px;color:#0d33a8;background:#fff;font-size:12px;font-weight:720;cursor:pointer;transition:.2s}
.bSec:hover{border-color:#aebff1}
.status{font-size:11px;color:#687695}
.status.ok{color:#15a46f}
.status.err{color:#dc2626}
</style>

<script>
var _tema = 'claro';
var _usuario = '';

function getCfgKey() { return 'riva_config_' + (_usuario || 'default'); }

function carregarCfg() {
  try { var s = JSON.parse(localStorage.getItem('riva_sessao')||'{}'); _usuario = s.usuario||''; } catch(e) {}
  try { var cfg = JSON.parse(localStorage.getItem(getCfgKey())||'{}'); _tema = cfg.tema||'claro'; } catch(e) {}
  aplicarUI();
  var msg = document.getElementById('statusMsg');
  if (msg) msg.textContent = _usuario ? 'Conta: ' + _usuario : 'Configurações carregadas.';
}

function aplicarUI() {
  document.getElementById('body').className = _tema;
  document.getElementById('optClaro').classList.toggle('sel', _tema === 'claro');
  document.getElementById('optEscuro').classList.toggle('sel', _tema === 'escuro');

}

function setTema(t) { _tema = t; aplicarUI(); }

function salvar() {
  // Salvar via RivaConfig (funciona em todos os painéis)
  if (window.RivaConfig) {
    window.RivaConfig.salvar(_tema, null);
  } else {
    var cfg = { tema: _tema };
    localStorage.setItem(getCfgKey(), JSON.stringify(cfg));
  }
  var msg = document.getElementById('statusMsg');
  msg.textContent = '✓ Salvo! O tema será aplicados em todos os painéis.';
  msg.className = 'status ok';
  var btn = document.getElementById('btnSalvar');
  btn.innerHTML = '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Salvo!';
  setTimeout(function(){ btn.innerHTML = '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Salvar'; }, 2000);
  // Aplicar imediatamente na página de configurações
  aplicarUI();
}

carregarCfg();
</script>
