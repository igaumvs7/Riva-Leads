<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script src="riva-config.js"></script>
<meta name="mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reuniões — Riva Vendas CE</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTMiIGZpbGw9IiMwZDFmNmQiLz48cGF0aCBkPSJNMTQgOHY0OGg5VjM1aDEwbDExIDIwaDEwTDQyIDMyYzYtMyA5LTkgOS0xNSAwLTctNS0xMC0xMy0xMEgxNHptOSA5aDEzYzQgMCA2IDIgNiA2cy0yIDYtNiA2SDIzVjE3eiIgZmlsbD0iI2ZmZiIvPjxwYXRoIGQ9Ik0yNSAzMHYxNmwxMy04LTEzLTh6IiBmaWxsPSIjZmYxZTFlIi8+PC9zdmc+">
<meta name="theme-color" content="#0d1f6d">
<link rel="stylesheet" href="riva-shell.css">
<style>
/* CSS específico das Reuniões */
.calHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.calNav{display:flex;align-items:center;gap:6px}
.calNav button{width:34px;height:34px;border:1px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;color:var(--ink);display:grid;place-items:center;transition:.2s}
.calNav button:hover{background:#eef2ff;border-color:#89a5ee}
.calNav h2{font-size:20px;font-weight:900;letter-spacing:-.02em;min-width:200px;text-align:center}
[data-theme="dark"] .calNav button{background:#12151f;border-color:#292f3e;color:#eef2fb}
[data-theme="dark"] .calNav button:hover{background:#181d2a}

.calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 6px 18px rgba(17,42,101,.05)}
[data-theme="dark"] .calGrid{background:#12151f;border-color:#292f3e}
.calDow{padding:8px 4px;text-align:center;font-size:10px;font-weight:850;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
.calDay{min-height:96px;padding:8px;border:1px solid #eef1f7;border-radius:9px;background:#f9fbfe;position:relative;cursor:pointer;transition:.2s;overflow:hidden}
.calDay:hover{border-color:var(--royal);background:#eef2ff}
.calDay.other{opacity:.35}
.calDay.today{background:linear-gradient(135deg,rgba(22,72,216,.14),rgba(22,72,216,.04));border-color:var(--royal)}
.calDay .dNum{font-size:12px;font-weight:750;color:var(--ink)}
.calDay.today .dNum{color:var(--royal)}
[data-theme="dark"] .calDay{background:#0d1018;border-color:#242b3b}
[data-theme="dark"] .calDay:hover{background:#181d2a}
[data-theme="dark"] .calDay .dNum{color:#eef2fb}
[data-theme="dark"] .calDay.today{background:linear-gradient(135deg,rgba(126,163,255,.18),rgba(126,163,255,.04));border-color:#7ea3ff}
.evPill{margin-top:4px;padding:3px 6px;border-radius:5px;font-size:9px;font-weight:750;background:var(--royal);color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.evPill.red{background:#dc2626}
.evPill.green{background:#15a46f}
.evPill.amber{background:#eab308;color:#0c1e48}
.evMore{margin-top:4px;font-size:9px;color:var(--royal);font-weight:750}

.newBtn{padding:9px 16px;border-radius:10px;background:linear-gradient(135deg,#1648d8,#0d33a8);color:#fff;font-size:12px;font-weight:750;border:0;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px;box-shadow:0 8px 20px rgba(22,72,216,.28);transition:.2s}
.newBtn:hover{transform:translateY(-1px)}

/* Modal criação de reunião */
.rModalOverlay{position:fixed;inset:0;z-index:100;display:none;align-items:flex-start;justify-content:center;padding:5vh 20px;background:rgba(3,6,20,.85);overflow-y:auto}
.rModalOverlay.open{display:flex}
.rModal{width:100%;max-width:560px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 30px 70px rgba(4,12,40,.4);animation:mIn .3s ease-out}
[data-theme="dark"] .rModal{background:#12151f;color:#eef2fb}
@keyframes mIn{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
.rModal header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
[data-theme="dark"] .rModal header{border-color:#292f3e}
.rModal header h3{font-size:17px;font-weight:900;letter-spacing:-.02em}
.rModal .close{width:32px;height:32px;border-radius:9px;background:#f4f7fb;border:0;font-size:20px;cursor:pointer;color:var(--muted);display:grid;place-items:center}
.rBody{padding:18px 22px;display:flex;flex-direction:column;gap:14px}
.rFld{display:flex;flex-direction:column;gap:5px}
.rFld label{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.rFld input,.rFld select,.rFld textarea{height:40px;padding:0 12px;border:1px solid var(--line);border-radius:9px;background:#f9fbfe;font-size:13px;color:var(--ink);font-family:inherit;outline:0}
.rFld textarea{height:auto;padding:10px 12px;min-height:60px;resize:vertical}
[data-theme="dark"] .rFld input,[data-theme="dark"] .rFld select,[data-theme="dark"] .rFld textarea{background:#0d1018;border-color:#292f3e;color:#eef2fb}
.rFld input:focus,.rFld select:focus,.rFld textarea:focus{border-color:#89a5ee;background:#fff;outline:0}
.rGrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rEscopo{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rEscopo label{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;cursor:pointer;font-size:12px;font-weight:650;background:#f9fbfe}
.rEscopo label:hover{border-color:#89a5ee}
.rEscopo input:checked+span{color:var(--royal);font-weight:800}
[data-theme="dark"] .rEscopo label{background:#0d1018;border-color:#292f3e}
.rFoot{padding:14px 22px;background:#f7f9fd;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
[data-theme="dark"] .rFoot{background:#0d1018;border-color:#292f3e}
.btnCanc{padding:9px 14px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:12px;font-weight:650;cursor:pointer;font-family:inherit;color:var(--ink)}
.btnDel{padding:9px 14px;border:1px solid rgba(220,38,38,.3);border-radius:9px;background:rgba(220,38,38,.08);font-size:12px;font-weight:650;cursor:pointer;font-family:inherit;color:#dc2626}
[data-theme="dark"] .btnCanc{background:#12151f;border-color:#292f3e;color:#eef2fb}

/* Lista upcoming */
.upList{margin-bottom:22px}
.upItem{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:8px;cursor:pointer;transition:.2s}
.upItem:hover{border-color:var(--royal);transform:translateX(2px)}
[data-theme="dark"] .upItem{background:#12151f;border-color:#292f3e}
.upDate{width:56px;text-align:center;padding:8px;background:#eef2ff;border-radius:9px;flex-shrink:0}
[data-theme="dark"] .upDate{background:#181d2a}
.upDate strong{display:block;font-size:18px;font-weight:900;color:var(--royal);line-height:1}
.upDate small{display:block;font-size:9px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.upBody{flex:1;min-width:0}
.upBody strong{display:block;font-size:13px;font-weight:750;color:var(--ink)}
.upBody small{display:block;font-size:11px;color:var(--muted);margin-top:2px}
[data-theme="dark"] .upBody strong{color:#eef2fb}
.upChip{padding:4px 8px;border-radius:6px;font-size:9px;font-weight:800;background:rgba(22,72,216,.14);color:var(--royal);white-space:nowrap}
</style>
</head>
<body>
<div class="app sidebarExpanded" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="brandArea">
      <div class="fullBrand">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTMiIGZpbGw9IiNmZmYiLz48cGF0aCBkPSJNMTQgOHY0OGg5VjM1aDEwbDExIDIwaDEwTDQyIDMyYzYtMyA5LTkgOS0xNSAwLTctNS0xMC0xMy0xMEgxNHptOSA5aDEzYzQgMCA2IDIgNiA2cy0yIDYtNiA2SDIzVjE3eiIgZmlsbD0iIzBkMWY2ZCIvPjxwYXRoIGQ9Ik0yNSAzMHYxNmwxMy04LTEzLTh6IiBmaWxsPSIjZmYxZTFlIi8+PC9zdmc+" alt="Riva">
        <strong>REUNIÕES</strong>
      </div>
      <img class="brandMark" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTMiIGZpbGw9IiNmZmYiLz48cGF0aCBkPSJNMTQgOHY0OGg5VjM1aDEwbDExIDIwaDEwTDQyIDMyYzYtMyA5LTkgOS0xNSAwLTctNS0xMC0xMy0xMEgxNHptOSA5aDEzYzQgMCA2IDIgNiA2cy0yIDYtNiA2SDIzVjE3eiIgZmlsbD0iIzBkMWY2ZCIvPjxwYXRoIGQ9Ik0yNSAzMHYxNmwxMy04LTEzLTh6IiBmaWxsPSIjZmYxZTFlIi8+PC9zdmc+" alt="R">
    </div>
    <nav class="sideNav">
      <a href="home.html" class="navItem" style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;margin-bottom:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.8);font-size:13px;font-weight:700;text-decoration:none">
        <span class="navIcon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M9 21V12h6v9"/></svg></span>
        <span class="navLabel">Painel Inicial</span>
      </a>
      <button class="navItem active" data-page="cal" onclick="navTo('cal')">
        <span class="navIcon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg></span>
        <span class="navLabel">Calendário</span>
        <span class="activeRail"></span>
      </button>
      <button class="navItem" data-page="upcoming" onclick="navTo('upcoming')">
        <span class="navIcon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
        <span class="navLabel">Próximas</span>
      </button>
    </nav>
    <div class="sidebarFooter">
      <div class="miniStatus"><span class="pulseDot"></span><div>
        <strong id="sideUserName" style="font-size:12px">Usuário</strong>
        <small id="sideUserCargo" style="color:rgba(255,255,255,.58);font-size:9px;display:block;margin-top:2px">—</small>
      </div></div>
      <div class="sidebarDecoration"><i></i><i></i><i></i></div>
    </div>
  </aside>
  <button class="sidebarBackdrop" id="sidebarBackdrop" onclick="closeMobileMenu()"></button>

  <header class="topbar">
    <button class="menuToggle isOpen" id="menuToggle" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
    <div class="topbarTitle"><span>RIVA VENDAS</span><strong id="pageTitle">Calendário</strong></div>
    <div class="topbarTools">
      <button class="syncPill loading" id="syncPill" onclick="loadRemote()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7v5h-5"/><path d="M4 17v-5h5"/><path d="M6.1 8a7 7 0 0 1 11.4-2L20 8M4 16l2.5 2A7 7 0 0 0 18 16"/></svg><span><strong id="syncLabel">Conectando</strong><small>Nuvem</small></span></button>
      <button class="profileButton" onclick="doLogout()"><span id="profileIni">--</span><div><strong id="profileNome">—</strong><small id="profileCargo">—</small></div></button>
    </div>
  </header>

  <main class="mainContent"><div class="pageTransition" id="pageContent"></div></main>

  <!-- Modal Reunião -->
  <div class="rModalOverlay" id="rModal" onmousedown="if(event.target===this)fecharModal()">
    <div class="rModal">
      <header>
        <h3 id="rTitle">Nova Reunião</h3>
        <button class="close" onclick="fecharModal()">×</button>
      </header>
      <div class="rBody">
        <input type="hidden" id="rId">
        <div class="rFld"><label>Título da Reunião</label><input type="text" id="rTit" placeholder="Ex.: Alinhamento semanal"></div>
        <div class="rGrid2">
          <div class="rFld"><label>Data</label><input type="date" id="rData"></div>
          <div class="rFld"><label>Horário</label><input type="time" id="rHora" value="09:00"></div>
        </div>
        <div class="rFld"><label>Duração (min)</label><select id="rDur"><option value="30">30 min</option><option value="45">45 min</option><option value="60" selected>1 hora</option><option value="90">1h30</option><option value="120">2 horas</option></select></div>
        <div class="rFld"><label>Local (opcional)</label><input type="text" id="rLocal" placeholder="Ex.: Sala Central · Meet · Zoom"></div>
        <div class="rFld"><label>Descrição (opcional)</label><textarea id="rDesc" placeholder="Pauta / detalhes..."></textarea></div>
        <div class="rFld"><label>Convocar</label>
          <div class="rEscopo" id="rEscopo">
            <!-- opções preenchidas via JS -->
          </div>
        </div>
      </div>
      <div class="rFoot">
        <button class="btnDel" id="rBtnDel" onclick="excluirReuniao()" style="display:none">Excluir</button>
        <button class="btnCanc" onclick="fecharModal()">Cancelar</button>
        <button class="newBtn" onclick="salvarReuniao()">Salvar</button>
      </div>
    </div>
  </div>

  <div class="toastMessage" id="toast" style="position:fixed;z-index:99;bottom:28px;left:50%;transform:translateX(-50%);min-width:200px;max-width:340px;padding:11px 16px;display:none;align-items:center;gap:10px;border-radius:14px;background:#0c2a7a;color:#fff;font-size:12px;font-weight:650;box-shadow:0 18px 40px rgba(4,12,40,.3)">✓ <span id="toastMsg"></span></div>
</div>
<script>
var SU = 'https://script.google.com/macros/s/AKfycbz1_ohqAABk-RhPb-i67e6eITzk9ve5hNnCI9qICtEuudSCl0Pu3pHtlV0cxMGUsZyKAg/exec';
var MS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DOW = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];

// Hierarquia
var HIER = {
  rene: { nome:'Rene', gvs:['Aloisio','Flavia','Sergio','Pereira','Lima','Carol','Paulo','Lemos'] },
  cahu: { nome:'Cahú', gvs:['Priscilla','Mikaella','Carol','Paulo','Redney','Claudio','Daniel','Sheily','Melquisedeque','Fernanda'] }
};
var REGIONAIS = ['Rene','Cahú'];

var S = { page:'cal', user:{}, canConvoke:false, canConvokeAll:false, cur:new Date(), reunioes:[], sidebarOpen:true, editing:null, config:{} };

document.addEventListener('DOMContentLoaded', function(){
  try { S.user = JSON.parse(localStorage.getItem('riva_sessao')||'{}'); } catch(e) {}
  if(!S.user.usuario){ window.location.href='home.html'; return; }

  // Regras de convocação:
  //  - Admin e Diretor: podem convocar TODOS ou selecionar
  //  - Regional (Rene/Cahú): podem convocar SEUS gerentes
  //  - Outros: só veem (não convocam)
  var cargo = S.user.cargo||'';
  S.canConvokeAll = (cargo==='Administrador' || cargo==='Diretor de Vendas');
  S.canConvoke = S.canConvokeAll || (cargo==='Gerente Regional' || cargo==='Regional');

  if(window.RivaConfig){ var c=window.RivaConfig.get(); if(c.tema) window.RivaConfig.aplicarTema(c.tema); }

  var nm = S.user.usuario||'Usuário';
  var nC = nm.charAt(0).toUpperCase()+nm.slice(1);
  document.getElementById('sideUserName').textContent = nC;
  document.getElementById('sideUserCargo').textContent = S.user.cargo||'—';
  document.getElementById('profileIni').textContent = nC.slice(0,2).toUpperCase();
  document.getElementById('profileNome').textContent = nC;
  document.getElementById('profileCargo').textContent = S.user.cargo||'';

  navTo('cal');
  setTimeout(loadRemote, 400);
});

function navTo(page){
  S.page = page;
  document.querySelectorAll('.navItem').forEach(function(b){ b.classList.remove('active'); var r=b.querySelector('.activeRail'); if(r) r.remove(); });
  var btn = document.querySelector('.navItem[data-page="'+page+'"]');
  if(btn){ btn.classList.add('active'); var r=document.createElement('span'); r.className='activeRail'; btn.appendChild(r); }
  document.getElementById('pageTitle').textContent = page==='cal'?'Calendário':'Próximas';
  if(window.innerWidth<=760) closeMobileMenu();
  renderPage();
}
function toggleSidebar(){
  if(window.innerWidth<=760){
    var sb=document.getElementById('sidebar'), bd=document.getElementById('sidebarBackdrop');
    var open=sb.classList.contains('mobileOpen');
    if(open){ sb.classList.remove('mobileOpen'); bd.style.display='none'; }
    else{ sb.classList.add('mobileOpen'); bd.style.display='block'; }
    document.getElementById('menuToggle').classList.toggle('isOpen',!open);
  } else {
    S.sidebarOpen=!S.sidebarOpen;
    document.getElementById('app').className='app '+(S.sidebarOpen?'sidebarExpanded':'sidebarCollapsed');
  }
}
function closeMobileMenu(){
  document.getElementById('sidebar').classList.remove('mobileOpen');
  document.getElementById('sidebarBackdrop').style.display='none';
}
function doLogout(){ if(!confirm('Sair?')) return; localStorage.removeItem('riva_sessao'); window.location.href='home.html'; }

function setSyn(st){
  var p=document.getElementById('syncPill'), l=document.getElementById('syncLabel');
  p.classList.remove('loading','online','offline');
  if(st==='loading'){ p.classList.add('loading'); l.textContent='Sincronizando'; }
  else if(st==='ok'){ p.classList.add('online'); l.textContent='Sincronizado'; }
  else { p.classList.add('offline'); l.textContent='Offline'; }
}
async function loadRemote(){
  setSyn('loading');
  try{
    var r=await fetch(SU+'?action=getConfig&t='+Date.now());
    var j=await r.json();
    if(j.status==='ok' && j.config) S.config = j.config;
    S.reunioes = coletarReunioes();
    setSyn('ok'); renderPage();
  }catch(e){ setSyn('offline'); }
}
function coletarReunioes(){
  // Lê todas as chaves reunioes_YYYY-MM da config
  var out = [];
  Object.keys(S.config).forEach(function(k){
    if(k.indexOf('reunioes_')===0){
      var arr = S.config[k];
      if(Array.isArray(arr)) out = out.concat(arr);
    }
  });
  return out.sort(function(a,b){ return (a.data+a.hora) < (b.data+b.hora) ? -1 : 1; });
}
async function saveReunioes(){
  // agrupa por mês
  var porMes = {};
  S.reunioes.forEach(function(r){
    var ym = r.data.slice(0,7); // 2026-07
    if(!porMes['reunioes_'+ym]) porMes['reunioes_'+ym] = [];
    porMes['reunioes_'+ym].push(r);
  });
  try{
    setSyn('loading');
    await fetch(SU,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({config:porMes})});
    Object.assign(S.config, porMes);
    setSyn('ok');
    return true;
  }catch(e){ setSyn('offline'); return false; }
}

var _toastT;
function toast(msg, err){ var t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=msg; t.style.background=err?'#b91c1c':'#0c2a7a'; t.style.display='flex'; clearTimeout(_toastT); _toastT=setTimeout(function(){ t.style.display='none'; },2500); }
function uid(){ return 'r'+Date.now()+Math.floor(Math.random()*999); }

// ══════════════ ROTEADOR ══════════════
function renderPage(){
  if(S.page==='cal') viewCal();
  else viewUpcoming();
}

// ══════════════ CALENDÁRIO ══════════════
function viewCal(){
  var y = S.cur.getFullYear(), m = S.cur.getMonth();
  var el = document.getElementById('pageContent');
  el.innerHTML = ''
    + '<div class="calHead">'
    +   '<div class="calNav">'
    +     '<button onclick="navMes(-1)" title="Mês anterior"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>'
    +     '<h2>'+MS[m]+' '+y+'</h2>'
    +     '<button onclick="navMes(1)" title="Próximo mês"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>'
    +     '<button onclick="hoje()" style="margin-left:8px;width:auto;padding:0 14px;font-size:11px;font-weight:700">Hoje</button>'
    +   '</div>'
    +   (S.canConvoke ? '<button class="newBtn" onclick="abrirNovaReuniao()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova Reunião</button>' : '')
    + '</div>'
    + '<div class="calGrid" id="calGrid"></div>';

  renderCal();
}

function navMes(delta){
  S.cur = new Date(S.cur.getFullYear(), S.cur.getMonth()+delta, 1);
  viewCal();
}
function hoje(){ S.cur = new Date(); viewCal(); }

function renderCal(){
  var y = S.cur.getFullYear(), m = S.cur.getMonth();
  var first = new Date(y,m,1), last = new Date(y,m+1,0);
  var startDow = first.getDay();
  var days = last.getDate();
  var today = new Date(); today.setHours(0,0,0,0);
  var todayISO = ymd(today);

  var html = '';
  DOW.forEach(function(d){ html += '<div class="calDow">'+d+'</div>'; });

  // dias do mês anterior (preenchimento)
  var prevLast = new Date(y,m,0).getDate();
  for(var i=startDow-1;i>=0;i--){
    var day = prevLast-i;
    var dISO = ymd(new Date(y,m-1,day));
    html += renderDayCell(day, dISO, true);
  }
  // dias do mês
  for(var d=1;d<=days;d++){
    var dISO = ymd(new Date(y,m,d));
    html += renderDayCell(d, dISO, false, dISO===todayISO);
  }
  // preenchimento do próximo mês (até completar semanas)
  var totalCells = startDow + days;
  var rest = (7 - (totalCells%7)) % 7;
  for(var d=1;d<=rest;d++){
    var dISO = ymd(new Date(y,m+1,d));
    html += renderDayCell(d, dISO, true);
  }

  document.getElementById('calGrid').innerHTML = html;
}
function renderDayCell(day, iso, other, today){
  var evs = S.reunioes.filter(function(r){ return r.data===iso && podeVer(r); });
  var pills = evs.slice(0,3).map(function(r){
    var cls = r.escopo==='todos'?'':(r.escopo==='regionais'?'red':(r.escopo==='rene'?'':(r.escopo==='cahu'?'red':'amber')));
    return '<div class="evPill '+cls+'" onclick="event.stopPropagation();editarReuniao(\''+r.id+'\')">'+r.hora+' '+esc(r.titulo)+'</div>';
  }).join('');
  var more = evs.length>3 ? '<div class="evMore">+'+(evs.length-3)+' mais</div>' : '';
  return '<div class="calDay '+(other?'other':'')+(today?' today':'')+'" onclick="'+(S.canConvoke?'clicarDia(\''+iso+'\')':'')+'">'
    + '<div class="dNum">'+day+'</div>'+pills+more
    + '</div>';
}
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return String(s||'').replace(/[<>&"]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];}); }

function podeVer(r){
  var cargo = S.user.cargo||'';
  // Admin e Diretor veem TUDO
  if(cargo==='Administrador' || cargo==='Diretor de Vendas') return true;
  // Se a reunião foi convocada por Admin/Diretor, precisa checar escopo
  if(r.escopo==='todos') return true;
  if(r.escopo==='regionais') return cargo==='Gerente Regional' || cargo==='Regional';
  if(r.escopo==='rene' || r.escopo==='cahu'){
    // membros da regional
    var lista = HIER[r.escopo].gvs.map(function(x){ return x.toLowerCase(); });
    return lista.indexOf((S.user.usuario||'').toLowerCase())>=0 || (S.user.usuario||'').toLowerCase()===r.escopo;
  }
  // Reunião com participantes selecionados
  if(r.escopo==='select' && Array.isArray(r.participantes)){
    return r.participantes.indexOf((S.user.usuario||'').toLowerCase())>=0;
  }
  return false;
}

function clicarDia(iso){
  if(!S.canConvoke) return;
  abrirNovaReuniao(iso);
}

// ══════════════ PRÓXIMAS ══════════════
function viewUpcoming(){
  var el = document.getElementById('pageContent');
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var hojeISO = ymd(hoje);
  var futuras = S.reunioes.filter(function(r){ return r.data >= hojeISO && podeVer(r); }).slice(0, 20);
  var passadas = S.reunioes.filter(function(r){ return r.data < hojeISO && podeVer(r); }).reverse().slice(0, 10);

  var html = ''
    + '<div class="calHead">'
    +   '<div><span style="font-size:10px;font-weight:850;letter-spacing:.14em;text-transform:uppercase;color:var(--royal)">AGENDA</span><h2 style="margin-top:4px;font-size:22px">Próximas Reuniões</h2></div>'
    +   (S.canConvoke ? '<button class="newBtn" onclick="abrirNovaReuniao()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova Reunião</button>' : '')
    + '</div>';
  if(futuras.length===0){
    html += '<div style="padding:40px;text-align:center;background:#fff;border:1px solid var(--line);border-radius:14px;color:var(--muted)">Nenhuma reunião agendada.'+(S.canConvoke?' Clique em "Nova Reunião".':'')+'</div>';
  } else {
    html += '<div class="upList">';
    futuras.forEach(function(r){
      var dt = new Date(r.data+'T00:00');
      html += '<div class="upItem" onclick="editarReuniao(\''+r.id+'\')">'
        + '<div class="upDate"><strong>'+dt.getDate()+'</strong><small>'+MS[dt.getMonth()].slice(0,3)+'</small></div>'
        + '<div class="upBody"><strong>'+esc(r.titulo)+'</strong><small>'+r.hora+' · '+(r.local||'sem local')+' · '+labelEscopo(r)+'</small></div>'
        + '<div class="upChip">'+labelEscopo(r)+'</div>'
        + '</div>';
    });
    html += '</div>';
  }
  if(passadas.length){
    html += '<h3 style="margin-top:20px;font-size:14px;color:var(--muted);font-weight:750;margin-bottom:10px">Passadas</h3><div class="upList" style="opacity:.7">';
    passadas.forEach(function(r){
      var dt = new Date(r.data+'T00:00');
      html += '<div class="upItem"><div class="upDate"><strong>'+dt.getDate()+'</strong><small>'+MS[dt.getMonth()].slice(0,3)+'</small></div><div class="upBody"><strong>'+esc(r.titulo)+'</strong><small>'+r.hora+' · '+labelEscopo(r)+'</small></div></div>';
    });
    html += '</div>';
  }
  el.innerHTML = html;
}
function labelEscopo(r){
  if(r.escopo==='todos') return 'Todos';
  if(r.escopo==='regionais') return 'Regionais';
  if(r.escopo==='rene') return 'Equipe Rene';
  if(r.escopo==='cahu') return 'Equipe Cahú';
  if(r.escopo==='select') return (r.participantes||[]).length+' pessoas';
  return '—';
}

// ══════════════ MODAL CRIAR/EDITAR ══════════════
function abrirNovaReuniao(dataIni){
  S.editing = null;
  document.getElementById('rTitle').textContent = 'Nova Reunião';
  document.getElementById('rId').value = '';
  document.getElementById('rTit').value = '';
  document.getElementById('rData').value = dataIni || ymd(new Date());
  document.getElementById('rHora').value = '09:00';
  document.getElementById('rDur').value = '60';
  document.getElementById('rLocal').value = '';
  document.getElementById('rDesc').value = '';
  document.getElementById('rBtnDel').style.display = 'none';
  renderEscopo();
  document.getElementById('rModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function editarReuniao(id){
  var r = S.reunioes.find(function(x){ return x.id===id; });
  if(!r) return;
  S.editing = r;
  document.getElementById('rTitle').textContent = 'Editar Reunião';
  document.getElementById('rId').value = r.id;
  document.getElementById('rTit').value = r.titulo;
  document.getElementById('rData').value = r.data;
  document.getElementById('rHora').value = r.hora;
  document.getElementById('rDur').value = r.duracao || 60;
  document.getElementById('rLocal').value = r.local||'';
  document.getElementById('rDesc').value = r.descricao||'';
  // só quem convocou (ou admin/diretor) pode excluir
  var cargo = S.user.cargo||'';
  var podeEditar = (cargo==='Administrador' || cargo==='Diretor de Vendas' || r.convocadoPor===(S.user.usuario||'').toLowerCase());
  document.getElementById('rBtnDel').style.display = podeEditar ? 'inline-block' : 'none';
  renderEscopo(r.escopo);
  document.getElementById('rModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function fecharModal(){
  document.getElementById('rModal').classList.remove('open');
  document.body.style.overflow='';
  S.editing = null;
}
function renderEscopo(atual){
  var opts = [];
  if(S.canConvokeAll){
    opts.push({v:'todos', label:'Todos', desc:'Time inteiro'});
    opts.push({v:'regionais', label:'Só Regionais', desc:'Rene e Cahú'});
    opts.push({v:'rene', label:'Equipe Rene', desc:HIER.rene.gvs.length+' GVs'});
    opts.push({v:'cahu', label:'Equipe Cahú', desc:HIER.cahu.gvs.length+' GVs'});
  } else {
    // Regional: só sua equipe
    var usr = (S.user.usuario||'').toLowerCase();
    if(usr==='rene') opts.push({v:'rene', label:'Minha Equipe (Rene)', desc:HIER.rene.gvs.length+' GVs'});
    else if(usr==='cahu' || usr==='cahú') opts.push({v:'cahu', label:'Minha Equipe (Cahú)', desc:HIER.cahu.gvs.length+' GVs'});
  }
  var html = opts.map(function(o,i){
    var checked = atual===o.v || (!atual && i===0);
    return '<label><input type="radio" name="esc" value="'+o.v+'"'+(checked?' checked':'')+'><span><strong style="display:block;font-size:12px">'+o.label+'</strong><small style="color:var(--muted);font-size:10px">'+o.desc+'</small></span></label>';
  }).join('');
  document.getElementById('rEscopo').innerHTML = html;
}
function salvarReuniao(){
  var titulo = document.getElementById('rTit').value.trim();
  var data = document.getElementById('rData').value;
  var hora = document.getElementById('rHora').value;
  if(!titulo || !data || !hora){ toast('Preencha título, data e horário', true); return; }
  var escopoEl = document.querySelector('input[name="esc"]:checked');
  var escopo = escopoEl ? escopoEl.value : 'todos';

  var reu = {
    id: S.editing ? S.editing.id : uid(),
    titulo: titulo,
    data: data,
    hora: hora,
    duracao: parseInt(document.getElementById('rDur').value)||60,
    local: document.getElementById('rLocal').value.trim(),
    descricao: document.getElementById('rDesc').value.trim(),
    escopo: escopo,
    convocadoPor: (S.user.usuario||'').toLowerCase(),
    criadoEm: new Date().toISOString()
  };
  if(S.editing){
    S.reunioes = S.reunioes.map(function(x){ return x.id===reu.id ? reu : x; });
  } else {
    S.reunioes.push(reu);
  }
  saveReunioes().then(function(ok){
    toast(ok ? 'Reunião salva!' : 'Salvo local. Sem conexão.', !ok);
    fecharModal();
    renderPage();
  });
}
function excluirReuniao(){
  if(!S.editing) return;
  if(!confirm('Excluir esta reunião?')) return;
  S.reunioes = S.reunioes.filter(function(x){ return x.id !== S.editing.id; });
  saveReunioes().then(function(){
    toast('Reunião excluída.');
    fecharModal();
    renderPage();
  });
}
</script>
